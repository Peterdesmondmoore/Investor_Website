dities", "US Growth & Business Cycle", "Global Growth and Economic Cycle"], "summary": "This Global X 2026 Perspectives report outlines key economic and market trends for the year ahead across North America, global equities, fixed income, commodities, and cash allocations. For North America, Canada is expected to face slowing momentum and shifting growth drivers, while the U.S. confronts tight labor conditions and potential upward wage and consumer price pressures. The report notes, \"Canada enters 2026 facing slowing momentum, shifting growth drivers, and heightened sensitivity to global trade and commodity trends.\" In fixed income, the U.S. Federal Reserve is challenged by a strained dual mandate amidst labor weakness and persistent inflation, with discussions around quantitative easing cessation and yield curve control. \"Extending duration appears tactical as term premiums increase, though sticky inflation and volatility remain primary investor risks.\" Global equity themes include anticipated continued volatility, strong performance in Canadian equities due to materials exposure, a moderately optimistic outlook for the S&amp;P 500, and AI as a central driver for the Nasdaq 100. Chinaâ€™s technology sector demonstrates \"durable, cost-driven momentum supported by scalable AI commercialization, favourable policy shifts, and expanding sector breadth.\" Commodities are a significant focus, with precious metals and energy expected to remain strong after 2025's rally. Gold has \"strong tailwinds entering 2026\" from central bank buying and currency debasement concerns, while forecasted shortages in various commodities due to sustainable energy transition and AI buildout suggest a potential super-cycle: \"The outlook for commodities in 2026 is strong. Perhaps 2026 is the start of the commodity super cycle?\" Finally, High Interest Savings Account (HISA) ETFs are presented as a viable option for investors seeking yield, flexibility, and liquidity in an uncertain interest rate environment."}, {"file_name": "emirates_nbd_research_-_market_economics_precious_metals_2026.pdf", "title": "Precious metals to extend gains in 2026", "document_type": "annual_or_multiyear_outlook", "publication_date": "2025-12-18", "expiry_date": "2026-12-18", "source": "Emirates NBD Research", "source_url": "https://www.emiratesnbdresearch.com/-/media/research/article/2025/december/emirates_nbd_research_-_market_economics_precious_metals_2026.pdf", "relevance": "very high", "theme_tags": ["Commodities", "Global Inflation and FX Dynamics"], "summary": "Precious metals experienced significant rallies in 2025, with gold prices surging to over USD 4,300/oz (up &gt;60%) and silver prices rising over 120% to exceed USD 60/oz. This momentum is anticipated to continue into 2026. Key drivers for the 2025 performance included substantial central bank gold purchases, retail investment, tightening supply across other precious metals like silver and platinum, and a weaker US dollar. For 2026, the outlook for gold remains constructive, supported by expectations of \"Lower rates from the Fed will keep investor enthusiasm for gold strong even if real rates may stay relatively static with expectations of sticky inflation in the US.\" A softer US dollar, though less sharply declining than in 2025, will also contribute. Additionally, \"broader unease over the fiscal sustainability of many G20 economies will keep investorsâ€™ attention focused on the relative haven of gold. A fraught global geopolitical environment also adds more support for a bullish gold case.\" The report forecasts \"gold prices at an average of USD 4,500/troy oz in Q4 2026, about a 10% gain from average prices in Q4 2025.\" Silver is seen to have even greater upside potential due to \"tight availability and its heavier loading in industrial applications, particularly around key AI-related hardware,\" especially after its designation as a critical mineral by the US government. Specific Q4 2026 forecasts include Gold at USD 4,500/troy oz, Silver at USD 65.00/troy oz, Platinum at USD 1,700.00/troy oz, and Palladium at USD 1,650.00/troy oz."}, {"file_name": "1kg4kkt-2510 JPM Lithium Upgrade on Higher ESS Demand.pdf", "title": "Lithium ESS demand to pull the market into deficit; upgrade short-term and long-term prices; Upgrade PLS to Overweight, MIN, IGO, LTR to Neutral", "document_type": "thematic_research", "publication_date": "2025-10-29", "expiry_date": "2026-10-29", "source": "J.P. Morgan", "source_url": "https://cdn-ceo-ca.s3.amazonaws.com/1kg4kkt-2510%20JPM%20Lithium%20Upgrade%20on%20Higher%20ESS%20Demand.pdf#:~:text=%E2%80%A2%20ESS%20comes%20through%20and,for%20lithium%20prices%2C%20Energy%20Storage", "relevance": "critical", "theme_tags": ["Commodities", "Equities"], "summary": "J.P. Morgan has significantly upgraded its short-term and long-term lithium price forecasts, citing that \"ESS demand to pull the market into deficit\". This outlook is driven by \"Material upgrades to our Energy Stationary Storage battery production estimates (+50%/+43% in 2025/26)\", which alone have pushed medium-term supply/demand forecasts into a deficit. The report notes that \"ESS comes through and saves the market from persistent surplus\", with energy storage representing 30% of lithium demand in 2026, projected to rise to 36% by 2030. Lithium spodumene price forecasts for 2026/27 have been increased from $800/t to $1100/$1200/t, and the long-term price from $1100/t to $1300/t. The upgraded long-term price is deemed appropriate due to higher long-term ESS demand and the market's willingness to impute a higher long-term price into equity valuations. Supply is expected to take time to respond, as \"several miners have stated they wonâ€™t look at restarting idle capacity unless the market consistently trades at $1200-1500/t\". Consequently, J.P. Morgan has upgraded its ratings for several lithium miners, moving Pilbara Minerals (PLS) from Underweight to Overweight as its sector preference, and upgrading Mineral Resources (MIN), IGO, and Liontown Resources (LTR) from Underweight to Neutral."}, {"file_name": "2026-01-08-Substantial-Shortfall-in-Copper-Supply-Widens-as-the-Race-for-AI-and-Growing-Defense-Spending-Add-to-Accelerating-Demand-New-S-P-Global-Study-Finds.pdf", "title": "'Substantial Shortfall' in Copper Supply Widens as the Race for AI and Growing Defense Spending Add to Accelerating Demand, New S&amp;P Global Study Finds", "document_type": "industry_report", "publication_date": "2026-01-08", "expiry_date": "2040-12-31", "source": "S&P Global", "source_url": "https://press.spglobal.com/2026-01-08-Substantial-Shortfall-in-Copper-Supply-Widens-as-the-Race-for-AI-and-Growing-Defense-Spending-Add-to-Accelerating-Demand,-New-S-P-Global-Study-Finds", "relevance": "critical", "theme_tags": ["Commodities", "Global Growth and Economic Cycle", "Global Trade and Demand"], "summary": "A new S&amp;P Global study, \"Copper in the Age of AI: The Challenges of Electrification,\" warns of a \"Substantial Shortfall\" in global copper supply, projecting a widening gap that poses a \"systemic risk for global industries, technological advancement and economic growth.\" Demand for copper is forecast to \"swell copper demand to 42 million metric tons by 2040, a 50% increase from current levels,\" driven by accelerating electrification, the race for artificial intelligence (AI), and surging defense spending. Despite expectations for recycled copper scrap to more than double, existing primary supply is projected to peak in 2030, leading to a \"supply deficit of 10 million metric tons by 2040â€”25% below projected demand.\" Daniel Yergin notes the quandary: \"copper is the great enabler of electrification, but the accelerating pace of electrification is an increasing challenge for copper.\" Key demand vectors include core economic demand, energy transition, AI and data centers (expected to roughly triple by 2040), and defense spending. Overcoming this shortfall requires significant investment in new mines and expansion of existing assets, as the sector faces challenges like declining ore grades, rising costs, environmental opposition, and lengthy permitting processes, taking an average of 17 years for a new mine to go from discovery to production. The study also highlights supply chain concentration, with six countries responsible for two-thirds of mining production and China dominating processing capacity, making global supply vulnerable to disruptions."}, {"file_name": "blog_Silver outlook to Q3 2026 Silvers second act the metals rally has room to run.pdf", "title": "Silver outlook to Q3 2026 - Silverâ€™s second act: the metalâ€™s rally has room to run", "document_type": "annual_or_multiyear_outlook", "publication_date": "2025-10-30", "expiry_date": "2026-09-30", "source": "WisdomTree Europe", "source_url": "https://www.wisdomtree.eu/api/sitecore/pdf/getblogpdf?id=dc416e42-3489-46ef-9145-7731911683ef", "relevance": "critical", "theme_tags": ["Commodities"], "summary": "This WisdomTree insight article provides a bullish outlook for silver prices through Q3 2026, forecasting them to reach $62/oz. The document asserts that \"todayâ€™s market is underpinned by strong fundamentals, setting the stage for further gains over the coming year,\" distinguishing it from the 2011 rally. Silver is characterized as a \"leveraged proxy for gold,\" with a beta of 1.4, implying it climbs 1.4% for every 1% rise in gold. Gold itself is expected to reach $4,530/oz by Q3 2026, supported by a depreciating dollar, falling bond yields, elevated inflation, and policy uncertainty. The silver market has experienced a \"deficit for four consecutive years,\" leading to \"physical tightness...evident in key markets, notably London and Mumbai,\" with London spot prices trading at a significant premium to Comex futures. This tightness is partly attributed to silver outflows from London vaults to the US due to fears of potential US tariffs. Industrial demand is expected to rise with easing monetary policy and greater economic activity, despite innovation in photovoltaic (PV) technologies that could \"reduce silver consumption per watt by 15â€“20% in 2025.\" Indian demand remains robust despite record local prices. The report concludes that \"silverâ€™s record-breaking rally is fundamentally justified, not speculative,\" driven by structural industrial demand, limited supply growth, and supportive macroeconomic drivers for gold."}, {"file_name": "Copper in the Age of AI_January 2026.pdf", "title": "Copper in the Age of AI: Challenges of Electrification", "document_type": "thematic_research", "publication_date": "2026-01-01", "expiry_date": "2027-01-01", "source": "S&P Global", "source_url": "https://www.spglobal.com/content/dam/spglobal/global-assets/en/special-reports/copper-in-the-age-of-ai/Copper%20in%20the%20Age%20of%20AI_January%202026.pdf", "relevance": "critical", "theme_tags": ["Commodities", "Global Growth and Economic Cycle", "Global Trade and Demand", "Property", "US Inflation and Price Dynamics"], "summary": "This S&amp;P Global report, \"Copper in the Age of AI: Challenges of Electrification,\" projects a substantial increase in global copper demand, driven by accelerating electrification, the rise of AI and data centers, energy transition initiatives, and defense modernization. The study forecasts copper demand to surge by 50%, \"from 28 million metric tons in 2025 to 42 million metric tons by 2040,\" underscoring copper's pivotal role as a critical metal. A significant challenge is identified: \"a potential 10 million metric ton copper shortfall by 2040 without meaningful supply expansion.\" Key demand drivers include AI and data centers, which are highly electricity-intensive, with \"data center demand for US electricity will rise from 5% of total electricity demand in 2025 to as much as 14% by 2030.\" The energy transition also plays a crucial role, as \"Electric vehicles (EVs) require 2.9 times more copper than a conventional car,\" alongside demand from solar, wind, battery storage, and transmission &amp; distribution infrastructure. Core economic demand (construction, machinery, appliances) and defense spending further contribute to the surge. The supply response, however, is constrained by factors such as declining ore grades, rising costs, and long development timelines, with the \"Average copper mine takes 17 years from discovery to production.\" Processing capacity is also concentrated, as \"China accounts for 12 of the 29 million metric tons of global smelting capacity.\" The report concludes that meeting future demand requires urgent policy action, investment, and innovation across the entire copper value chain."}, {"file_name": "Silver_The-Next-Generation-Metal_DECEMBER-Release.pdf", "title": "Silver, The Next Generation Metal", "document_type": "thematic_research", "publication_date": "2025-12-01", "expiry_date": "2026-12-01", "source": "The Silver Institute and Oxford Economics", "source_url": "https://silverinstitute.org/wp-content/uploads/2025/12/Silver_The-Next-Generation-Metal_DECEMBER-Release.pdf", "relevance": "critical", "theme_tags": ["Commodities", "Global Growth and Economic Cycle", "Global Trade and Demand"], "summary": "This report by The Silver Institute and Oxford Economics examines silver's pivotal role as a \"next generation metal\" across industries critical to green energy transition and digital transformation, leveraging its superior electrical/thermal conductivity and corrosion resistance. The document highlights three key sectors driving future silver demand: solar photovoltaics, automotive and electric vehicles, and data centers and artificial intelligence.\n\nIn **Solar Photovoltaics**, installed capacity has grown over tenfold in the last decade, with silver demand rising threefold. The outlook remains strong, with the IEA expecting solar to be the dominant renewable source by 2030, growing at a 17% CAGR. While technological \"thrifting\" reduces silver per cell, new next-gen solar cells (TOPCon, SHJ) require more silver, potentially offsetting reductions, though copper plating technologies show promise in further reducing silver content. Government policies, such as the EU's EUPowerEU plan and India's ambitious targets, support growth, but US subsidy cuts and trade tariffs pose risks.\n\nThe **Automotive and Electric Vehicles** sector is seeing a significant boost to silver demand. The shift to EVs has accelerated, with global EV production forecast to grow at a 13% CAGR between 2025 and 2031. Electric vehicles, especially battery electric vehicles (BEVs), consume significantly more silver (67-79% more) than internal combustion engine vehicles (ICEs). \"Overall, we forecast global silver demand by the automotive industry will increase at a CAGR of 3.4% between 2025-2031.\" EVs are projected to overtake ICEs as the primary source of automotive silver demand by 2027, reaching 59% of the share by 2031. Increased vehicle sophistication and the build-out of EV charging infrastructure further drive demand, despite mixed government incentives and rising tariffs impacting affordability.\n\n**Data Centres and Artificial Intelligence** represent another critical growth area for silver. Data centers, the backbone of the digital economy and AI systems, have seen \"total global IT power capacity grew by an estimated 53x, from 0.93 GW in 2000 to nearly 50 GW in 2025.\" This exponential rise in computing power directly translates to increased demand for silver-rich components in servers, network equipment, and cooling systems. Governments worldwide are prioritizing data centers as critical infrastructure, implementing policies to streamline regulation and provide incentives, which supports long-term capacity expansion. The accelerating digitalization and widespread uptake of AI, including specialized hardware like GPUs and TPUs, are expected to place growing demands on digital and physical infrastructure, driving further demand for silver as a foundational material in the AI-driven economy."}, {"file_name": "top-10-themes-for-2026.pdf", "title": "Top 10 Themes for 2026", "document_type": "annual_or_multiyear_outlook", "publication_date": "2026-01-13", "expiry_date": "2027-01-13", "source": "Sprott", "source_url": "https://sprott.com/insights/top-10-themes-for-2026/", "relevance": "critical", "theme_tags": ["Commodities", "Global Growth and Economic Cycle", "Global Trade and Demand", "US Liquidity and Monetary Conditions", "Cross Asset Positioning and Sentiment Analyst"], "summary": "This document outlines Sprott's Top 10 Themes for 2026, highlighting major structural shifts and their investment implications, particularly for hard assets and critical minerals. Key themes include \"Deglobalization: The Structural Shift Reshaping Markets\" which is accelerating, driving inflationary pressures, and altering global commodity flows, making hard assets \"strategic levers in a multi-polar world.\" The report emphasizes \"Fiscal Dominance and the Debasement Trade,\" where government spending dictates monetary policy, leading to a \"secular shift toward hard assets as fiat currencies rapidly lose purchasing power.\" This is compounded by the \"Fragmentation of Global Metal Inventory Systems,\" as geopolitical tensions and resource nationalism disrupt free movement of metals, creating localized shortages and price dislocations. The \"Long Hard Asset Trade Joins the Debasement Trade,\" driven by persistent fiscal deficits, AI-driven capital expenditure, and supply constraints. The \"Run-It-Hot Fiscal and Monetary Policy Playbook\" adopted by major economies prioritizes rapid economic growth over inflation control, leading to a reflationary impulse. \"Goldâ€™s Role as a Core Store of Value Strengthens\" due to central bank diversification and currency debasement. \"Silverâ€™s Dynamic Bull Case\" is powered by its dual role as a monetary hedge and an industrial metal, with structural supply deficits anticipated. \"Uraniumâ€™s Bull Market Setup Strengthens Into 2026\" due to tightening fundamentals, improving policy clarity, and increasing demand from AI infrastructure. \"Copperâ€™s Momentum Builds as Supply Shocks Meet Trade Dislocation,\" positioning it as a \"strategic bottleneck\" amidst transforming demand. Finally, \"Rare Earthsâ€™ Strategic Supply Chain Rebuild\" is accelerating outside China, driven by national security imperatives. The report concludes that these structural forces support a bullish bias for select commodities, which serve as essential hedges in a deglobalizing world."}, {"file_name": "World_Silver_Survey-2025.pdf", "title": "World Silver Survey 2025", "document_type": "annual_or_multiyear_outlook", "publication_date": "2025-04-01", "expiry_date": "2026-04-01", "source": "The Silver Institute", "source_url": "https://silverinstitute.org/wp-content/uploads/2025/04/World_Silver_Survey-2025.pdf", "relevance": "critical", "theme_tags": ["Commodities", "Global Growth and Economic Cycle", "US Liquidity and Monetary Conditions", "Global Inflation and FX Dynamics", "Equities"], "summary": "The World Silver Survey 2025 reports that 2024 was an \"exceptionally good year for silver,\" with prices seeing a \"21% intra-year increase\" and the market registering its \"fourth consecutive deficit.\" This strength was primarily driven by a positive macroeconomic and geopolitical backdrop, including supportive US monetary policy and investor excitement towards artificial intelligence. Industrial demand reached \"another record high\" in 2024, up 4% to 680.5Moz, propelled by structural gains in the green economy, such as photovoltaics and vehicle electrification, as well as AI-related consumer electronics. Mine production globally rose by 0.9% to 819.7Moz, with recycling also increasing. Despite strong fundamentals, silver's price performance relative to gold was \"arguably disappointing,\" with the gold:silver ratio remaining high, as gold's quasi-monetary attributes made it more attractive for diversification, and silver's industrial attributes were affected by caution towards the Chinese economy. Physical investment in bars and coins declined in Western markets but significantly rebounded in India. Looking ahead to 2025, \"conditions will remain positive for silver\" due to ongoing macroeconomic and geopolitical uncertainty, especially concerning US trade and foreign policy, and anticipated US interest rate cuts. Another significant deficit of 117.6Moz is forecast for 2025; however, its price impact is expected to be limited by \"still sizable stockpiles of silver.\" Mine supply is projected to rise by 2%, mainly from Mexico, Chile, and Russia, while industrial fabrication is forecast to flat-line due to thrifting in PV and slower ethylene oxide capacity growth. Longer term, mine production is expected to peak in 2026 and then decline, while silver's industrial demand linked to decarbonization (e.g., BEVs and PV installations) and AI developments is anticipated to \"outperform global GDP,\" eventually eroding above-ground silver inventories."}, {"file_name": "COMMODITIES 2026 Lithium carbonate surplus to narrow; energy storage to drive growth.pdf", "title": "COMMODITIES 2026: Lithium carbonate surplus to narrow; energy storage to drive growth", "document_type": "annual_or_multiyear_outlook", "publication_date": "2026-01-31", "expiry_date": "2026-07-31", "source": "S&P Global", "source_url": "", "relevance": "very high", "theme_tags": ["Commodities", "Global Growth and Economic Cycle", "Global Trade and Demand"], "summary": "The document, \"COMMODITIES 2026: Lithium carbonate surplus to narrow; energy storage to drive growth,\" forecasts a narrowing surplus in the global lithium carbonate market in 2026. The global lithium chemicals market surplus is anticipated to reduce to \"109,000 metric tons of lithium carbonate equivalent (LCE) in 2026, down from 141,000 mt in 2025,\" according to an S&amp;P Global Energy CERA report. \"Global consumption of lithium chemicals is forecast to rise 13.5% year over year to 1.48 million mt LCE in 2026, while supply is expected to increase 9.9% to 1.58 million mt LCE.\" Demand growth is primarily driven by \"energy storage and electric heavy trucks,\" with energy storage emerging as the \"most significant and outperforming driver of lithium-ion battery consumption.\" While demand growth from the traditional passenger electric vehicle segment is expected to be modest, \"global sales of electric vehicles (EV) are expected to continue growing in 2026.\" Supply is also expanding, with \"global lithium raw materials supply... expected to increase 10% year over year to reach 1.63 million mt LCE in 2026.\" However, potential geopolitical tensions in Nigeria and the cautious approach of Australian miners could lead to \"periodic supply shortages\" if prices remain sustained above $1,000/mt for six months. \"China's lithium carbonate prices trended upwards in the second half of 2025,\" with battery-grade lithium carbonate assessed by Platts at \"Yuan 117,000/mt ($16,734/mt) on a DDP China basis on Dec. 31, 2025, up 58.1% since the start of the year,\" and further rising to \"Yuan 141,000/mt DDP China Jan. 9.\""}, {"file_name": "copper-outlook-2026-institutional-rotation-supply-deficits-technical-analysis.pdf", "title": "Copper Outlook 2026: Institutional Rotation, Supply Deficits, and Technical Analysis", "document_type": "annual_or_multiyear_outlook", "publication_date": "2026-01-31", "expiry_date": "2027-01-31", "source": "Investing.com", "source_url": "https://www.investing.com/analysis/copper-outlook-2026-institutional-rotation-supply-deficits-technical-analysis-200673451?utm_source=chatgpt.com", "relevance": "very high", "theme_tags": ["Commodities", "Global Growth and Economic Cycle", "Global Trade and Demand", "Cross Asset Positioning and Sentiment Analyst"], "summary": "This document provides an outlook on copper for 2026, highlighting strong long-term demand driven by the global energy transition (electric infrastructure, smart grids, electric vehicles) and high-tech sectors (data centers, AI infrastructure), noting that \"Each electric vehicle uses significantly more copper than a conventional gas-powered car.\" The analysis points to a \"Tightening Supply-Demand Balance,\" with J.P. Morgan Global Research forecasting \"a refined copper deficit of around 330,000 tons in 2026, with an average price near $12,075/ton and a peak around $12,500/ton in Q2.\" Citigroup also sees \"copper potentially exceeding $13,000/ton and approaching $15,000/ton in 2026 if supply shortages and low inventories persist.\" The report identifies an \"Institutional Money Rotation\" where \"large investors are gradually rebalancing portfolios from gold and silver into base metals like copper,\" making copper an attractive investment channel. Technical analysis, based on January 2026 prices, indicates copper is \"marking new historical highs on the monthly chart\" with a \"clear long-term uptrend\" and strong momentum, suggesting \"room for further gains.\" Key risks include the speculative nature of part of the price rally, China's economic growth, and potential material substitution or technological innovation. The conclusion emphasizes that copper is \"emerging as a strategic asset for institutions\" in 2026 due to these factors, leading to \"high price expectations and volatility.\""}, {"file_name": "How to Identify ASX Lithium Market Leaders as Momentum Trading Opportunities in 2026.pdf", "title": "How to Identify ASX Lithium Market Leaders as Momentum Trading Opportunities in 2026", "document_type": "thematic_research", "publication_date": "2026-01-21", "expiry_date": "2027-01-21", "source": "Finer Market Points", "source_url": "https://www.finermarketpoints.com/post/how-to-identify-asx-lithium-market-leaders-as-momentum-trading-opportunities-in-2026?utm_source=chatgpt.com", "relevance": "very high", "theme_tags": ["Equities", "Commodities", "Global Growth and Economic Cycle"], "summary": "The Australian lithium sector is undergoing a significant transformation, with prices recovering 57% from June 2025 lows, creating"}, {"file_name": "jpmorgan_Global Research.pdf", "title": "Will gold prices break $5,000/oz in 2026?", "document_type": "annual_or_multiyear_outlook", "publication_date": "2025-12-16", "expiry_date": "2026-12-16", "source": "J.P. Morgan", "source_url": "https://www.jpmorgan.com/insights/global-research/commodities/gold-prices?utm_source=chatgpt.com", "relevance": "critical", "theme_tags": ["Commodities", "Global Growth and Economic Cycle", "Cross Asset Positioning and Sentiment Analyst", "Global Trade and Demand"], "summary": "J.P. Morgan Global Research forecasts a bullish outlook for gold prices in 2026 and 2027, driven by persistent demand from central banks and investors. Gold prices surged in 2025, climbing as much as 55% and surpassing $4,000/oz, and are expected to continue this trend. \"Prices are expected to push toward $5,000/oz by the fourth quarter of 2026, with $6,000/oz a possibility longer term.\" The report projects prices to average $5,055/oz by the final quarter of 2026, rising to $5,400/oz by the end of 2027. \"Central bank and investor demand for gold is set to remain strong, averaging 585 tonnes a quarter in 2026.\" Central bank purchases, while potentially lower in volume than recent peaks, are still projected at an elevated 755 tonnes in 2026, reflecting a structural trend of diversification away from USD reserves. Investor demand, including ETFs, physical bars, and coins, is also anticipated to remain robust, with around 250 tonnes of inflows into ETFs and over 1,200 tonnes of annual bar and coin demand in 2026. \"While goldâ€™s share of total investor AUM has grown by around one percentage point over the last two years as prices and demand have increased, we still see the potential for this share to rise toward 4â€“5% over the coming years.\" A weaker U.S. dollar, lower interest rates, and geopolitical uncertainty are cited as additional factors bolstering gold's appeal as a safe-haven asset and a hedge against currency debasement."}, {"file_name": "Lithium Corporation Highlights Strengthening Market Fundamentals Across Lithium and Rare Earth Sectors.pdf", "title": "Lithium Corporation Highlights Strengthening Market Fundamentals Across Lithium and Rare Earth Sectors", "document_type": "news_article", "publication_date": "2026-01-22", "expiry_date": "2027-01-22", "source": "Nasdaq", "source_url": "https://www.nasdaq.com/press-release/lithium-corporation-highlights-strengthening-market-fundamentals-across-lithium-and?utm_source=chatgpt.com", "relevance": "high", "theme_tags": ["Commodities"], "summary": "Lithium Corporation highlights \"strengthening fundamentals across the lithium and rare earth markets,\" attributing the trend to \"rising demand and tightening supply have lifted both sectors to multi year highs.\" The company notes that \"lithium prices moved above $20,000 per tonne for the first time since November 2023\" and \"Rare earth prices advanced sharply entering early 2026, as supply constraints and geopolitical tension converged with accelerating demand from technology and energy related industries, resulting in year over year gains approaching 50%.\" Market expectations suggest \"a sustained lithium recovery\" driven by energy storage demand from data centers and grid-scale storage, with forecasts indicating \"year on year growth of 40-55% from these segments,\" contributing to \"long term fundamentals.\" Lithium Corporation reports its portfolio \"remains well aligned\" with these conditions, having advanced its Las Pilas rare earth prospect in 2025 and secured an option agreement in January 2026. The company \"intends to resume fieldwork on its generative lithium projects in February, positioning these efforts to capitalize on the improving market outlook and current industry momentum.\""}, {"file_name": "Precious Metals Outlook 2026.pdf", "title": "Precious Metals Outlook 2026: Market Dynamics Following a Record-Breaking Year", "document_type": "annual_or_multiyear_outlook", "publication_date": "2026-01-07", "expiry_date": "2026-07-07", "source": "CME Group", "source_url": "https://www.cmegroup.com/articles/2026/precious-metals-outlook-2026-market-dynamics-following-a-record-breaking-year.html?utm_source=chatgpt.com", "relevance": "critical", "theme_tags": ["Commodities", "Global Growth and Economic Cycle", "Global Trade and Demand"], "summary": "This outlook for 2026 analyzes the dynamics of the precious metals market following a record-breaking 2025, where gold surpassed $4,000/ounce and silver exceeded $60/ounce. The report highlights that 2026 will be defined by evolving asset correlations and physical fundamentals, with distinct drivers for each metal rather than a singular macro narrative. Key themes include sustained central bank demand for gold, which is a \"relevant structural factor in the global gold market\" and is driven by a strategy to diversify foreign exchange reserves; most central bankers surveyed \"expected a higher share of gold reserves and lower U.S. dollar holdings 5 years from now.\" The document notes a divergence in gold's historical inverse correlation with real yields in 2025, suggesting that \"geopolitical hedging and sovereign diversification\" are now outweighing opportunity costs. The Gold/Silver Ratio is expected to exhibit heightened volatility, with silver often trailing gold's initial breakout but moving with greater intensity. The silver market is facing a \"fifth consecutive year of market deficit\" due to industrial consumption outpacing mine supply, with \"consistent offtake from the photovoltaics and broader electrification sectors has contributed to a drawdown in stock levels.\" Platinum Group Metals (PGMs) are shown to trade on distinct fundamentals, behaving more like \"industrial commodities with specific supply-side constraints\" tied to automotive demand and supply concentration risks. The conclusion emphasizes a complex environment for 2026, driven by the interplay of central bank activity, silver deficits, and gold's relationship with interest rates."}, {"file_name": "What Drives Sudden Precious Metals Price Reversals.pdf", "title": "What Drives Sudden Precious Metals Price Reversals", "document_type": "thematic_research", "publication_date": "2026-01-31", "expiry_date": "2027-01-31", "source": "Crux Investor", "source_url": "https://www.cruxinvestor.com/posts/why-gold-and-silver-suddenly-sold-off-and-what-it-means-for-investors-public-companies?utm_source=chatgpt.com", "relevance": "very high", "theme_tags": ["Commodities", "Cross Asset Positioning and Sentiment Analyst", "US Liquidity and Monetary Conditions", "US Inflation and Price Dynamics"], "summary": "Gold and silver markets experienced one of their sharpest short-term reversals in decades, with gold dropping close to 9% and silver more than 11% from their peaks. This dramatic sell-off, however, was"}, {"file_name": "Why Copper's Rally Is Being Re-Examined.pdf", "title": "From Momentum to Mean Reversion: Why Copper's Rally Is Being Re-Examined", "document_type": "asset_class_research", "publication_date": "2026-01-31", "expiry_date": "2027-01-31", "source": "Crux Investor", "source_url": "https://www.cruxinvestor.com/posts/coppers-price-ceiling-comes-into-focus-as-speculative-capital-may-unwind?utm_source=chatgpt.com", "relevance": "very high", "theme_tags": ["Commodities", "Equities", "Global Growth and Economic Cycle"], "summary": "Copper's rally, pushing prices above US$13,000 per tonne in early 2026, has been primarily driven by \"speculative positioning and policy fear\" rather than fundamental end-use demand or structural deficits. The document highlights a significant \"disconnect between price action and physical fundamentals\", raising concerns about its sustainabili     let filteredItems = [...allItems];
    let selectedSources = ['all'];
    let selectedDocTypes = ['all'];
    let selectedRelevance = ['all'];
    let selectedThemes = ['all'];
    let hideExpired = false;

    // DOM elements
    const searchInput = document.getElementById('searchInput');
    const sortSelect = document.getElementById('sortSelect');
    const resultsContainer = document.getElementById('resultsContainer');
    const resultsCount = document.getElementById('resultsCount');
    const hideExpiredBtn = document.getElementById('hideExpiredBtn');

    // Event listeners
    searchInput.addEventListener('input', applyFilters);
    sortSelect.addEventListener('change', applyFilters);

    // Close dropdowns when clicking outside
    document.addEventListener('click', function(event) {
      if (!event.target.closest('.relative')) {
        document.querySelectorAll('.filter-dropdown').forEach(dropdown => {
          dropdown.classList.remove('active');
        });
      }
    });

    function toggleDropdown(dropdownId) {
      event.stopPropagation();
      const dropdown = document.getElementById(dropdownId);
      const allDropdowns = document.querySelectorAll('.filter-dropdown');
      allDropdowns.forEach(d => {
        if (d.id !== dropdownId) d.classList.remove('active');
      });
      dropdown.classList.toggle('active');
    }

    function toggleHideExpired() {
      hideExpired = !hideExpired;
      const btn = hideExpiredBtn;
      if (hideExpired) {
        btn.classList.add('border-indigo-400/50', 'bg-indigo-500/20');
        btn.classList.remove('border-white/10', 'bg-white/5');
        btn.textContent = 'âœ“ Hide Expired';
      } else {
        btn.classList.remove('border-indigo-400/50', 'bg-indigo-500/20');
        btn.classList.add('border-white/10', 'bg-white/5');
        btn.textContent = 'Show All';
      }
      applyFilters();
    }

    function handleSourceFilter(checkbox) {
      handleMultiSelectFilter(checkbox, 'sourceDropdown', selectedSources, 'sourceFilterLabel', 'Sources');
    }

    function handleDocTypeFilter(checkbox) {
      handleMultiSelectFilter(checkbox, 'docTypeDropdown', selectedDocTypes, 'docTypeFilterLabel', 'Types', formatDocType);
    }

    function handleRelevanceFilter(checkbox) {
      handleMultiSelectFilter(checkbox, 'relevanceDropdown', selectedRelevance, 'relevanceFilterLabel', 'Relevance', formatRelevance);
    }

    function handleThemeFilter(checkbox) {
      handleMultiSelectFilter(checkbox, 'themeDropdown', selectedThemes, 'themeFilterLabel', 'Themes');
    }

    function handleMultiSelectFilter(checkbox, dropdownId, selectedArray, labelId, labelText, formatter = null) {
      const value = checkbox.value;
      const dropdown = document.getElementById(dropdownId);
      const checkboxes = dropdown.querySelectorAll('input[type="checkbox"]');
      
      if (value === 'all') {
        if (checkbox.checked) {
          selectedArray.length = 0;
          selectedArray.push('all');
          checkboxes.forEach(cb => {
            if (cb.value !== 'all') cb.checked = false;
          });
        } else {
          checkbox.checked = true;
        }
      } else {
        if (checkbox.checked) {
          checkboxes[0].checked = false;
          const index = selectedArray.indexOf('all');
          if (index > -1) selectedArray.splice(index, 1);
          selectedArray.push(value);
        } else {
          const index = selectedArray.indexOf(value);
          if (index > -1) selectedArray.splice(index, 1);
          if (selectedArray.length === 0) {
            selectedArray.push('all');
            checkboxes[0].checked = true;
          }
        }
      }
      
      updateFilterLabel(labelId, selectedArray, labelText, formatter);
      applyFilters();
    }

    function updateFilterLabel(labelId, selectedArray, labelText, formatter = null) {
      const label = document.getElementById(labelId);
      if (selectedArray.includes('all') || selectedArray.length === 0) {
        label.textContent = `All ${labelText}`;
      } else if (selectedArray.length === 1) {
        label.textContent = formatter ? formatter(selectedArray[0]) : selectedArray[0];
      } else {
        label.textContent = `${selectedArray.length} ${labelText.toLowerCase()} selected`;
      }
    }

    function formatDocType(type) {
      return type.replace(/_/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    function formatRelevance(rel) {
      return rel.replace(/_/g, ' ').split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    }

    function applyFilters() {
      const searchTerm = searchInput.value.toLowerCase();
      const sortBy = sortSelect.value;
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      // Filter
      filteredItems = allItems.filter(item => {
        const matchesSearch = 
          item.title.toLowerCase().includes(searchTerm) ||
          item.summary.toLowerCase().includes(searchTerm) ||
          item.source.toLowerCase().includes(searchTerm) ||
          item.theme_tags.some(tag => tag.toLowerCase().includes(searchTerm));
        
        const matchesSource = selectedSources.includes('all') || selectedSources.includes(item.source);
        const matchesDocType = selectedDocTypes.includes('all') || selectedDocTypes.includes(item.document_type);
        const matchesRelevance = selectedRelevance.includes('all') || selectedRelevance.includes(item.relevance);
        
        const matchesTheme = selectedThemes.includes('all') || 
                            selectedThemes.some(theme => item.theme_tags.includes(theme));
        
        // Expiry filter
        const isExpired = item.expiry_date && new Date(item.expiry_date) < today;
        const matchesExpiry = !hideExpired || !isExpired;

        return matchesSearch && matchesSource && matchesDocType && matchesRelevance && matchesTheme && matchesExpiry;
      });

      // Sort
      filteredItems.sort((a, b) => {
        if (sortBy === 'date-desc') {
          return new Date(b.publication_date || 0) - new Date(a.publication_date || 0);
        } else if (sortBy === 'date-asc') {
          return new Date(a.publication_date || 0) - new Date(b.publication_date || 0);
        } else if (sortBy === 'relevance-desc') {
          const relevanceOrder = { 'critical': 3, 'very high': 2, 'high': 1, 'medium': 0, 'low': -1 };
          return (relevanceOrder[b.relevance] || 0) - (relevanceOrder[a.relevance] || 0);
        } else if (sortBy === 'title-asc') {
          return a.title.localeCompare(b.title);
        } else if (sortBy === 'title-desc') {
          return b.title.localeCompare(a.title);
        }
        return 0;
      });

      renderResults();
    }

    function getRelevanceColor(relevance) {
      const colors = {
        'critical': 'bg-red-500/20 text-red-300',
        'very high': 'bg-orange-500/20 text-orange-300',
        'high': 'bg-amber-500/20 text-amber-300',
        'medium': 'bg-blue-500/20 text-blue-300',
        'low': 'bg-gray-500/20 text-gray-300'
      };
      return colors[relevance] || colors['medium'];
    }

    function getDocTypeColor(docType) {
      const colors = {
        'research_report': 'bg-indigo-500/20 text-indigo-300',
        'market_commentary': 'bg-cyan-500/20 text-cyan-300',
        'economic_analysis': 'bg-emerald-500/20 text-emerald-300',
        'other': 'bg-gray-500/20 text-gray-300'
      };
      return colors[docType] || colors['other'];
    }

    function getExpiryStatus(expiryDate) {
      if (!expiryDate) return 'unknown';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const expiry = new Date(expiryDate);
      expiry.setHours(0, 0, 0, 0);
      const daysUntilExpiry = Math.floor((expiry - today) / (1000 * 60 * 60 * 24));
      
      if (daysUntilExpiry < 0) return 'expired';
      if (daysUntilExpiry <= 30) return 'soon';
      return 'active';
    }

    function getExpiryBadge(expiryDate) {
      if (!expiryDate) return '';
      
      const status = getExpiryStatus(expiryDate);
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const expiry = new Date(expiryDate);
      expiry.setHours(0, 0, 0, 0);
      const daysUntilExpiry = Math.floor((expiry - today) / (1000 * 60 * 60 * 24));
      
      let text, cssClass;
      if (status === 'expired') {
        text = `Expired ${Math.abs(daysUntilExpiry)}d ago`;
        cssClass = 'expiry-expired';
      } else if (status === 'soon') {
        text = `Expires in ${daysUntilExpiry}d`;
        cssClass = 'expiry-soon';
      } else {
        text = `Valid ${daysUntilExpiry}d`;
        cssClass = 'expiry-active';
      }
      
      return `<span class="expiry-badge ${cssClass}">${text}</span>`;
    }

    function toggleSummary(id) {
      const element = document.getElementById(`summary-${id}`);
      const button = document.getElementById(`toggle-${id}`);
      
      if (element.classList.contains('line-clamp-3')) {
        element.classList.remove('line-clamp-3');
        button.textContent = 'Show less';
      } else {
        element.classList.add('line-clamp-3');
        button.textContent = 'Show more';
      }
    }

    function renderResults() {
      resultsCount.textContent = `Showing ${filteredItems.length} of ${allItems.length} documents`;

      if (filteredItems.length === 0) {
        resultsContainer.innerHTML = `
          <div class="py-16 text-center">
            <p class="text-lg text-white/50">No documents found matching your criteria.</p>
          </div>
        `;
        return;
      }

      resultsContainer.innerHTML = filteredItems.map((item, index) => {
        const expiryStatus = getExpiryStatus(item.expiry_date);
        const isExpired = expiryStatus === 'expired';
        const containerClass = isExpired ? 'expired' : '';
        
        return `
        <div class="group rounded-2xl border border-white/10 bg-white/5 p-6 backdrop-blur-sm transition-all hover:border-indigo-400/50 hover:bg-white/10 ${containerClass}">
          <!-- Header row: Source, Type, Relevance, Date, Expiry -->
          <div class="mb-3 flex flex-wrap items-center gap-2 text-xs">
            <span class="rounded-full bg-indigo-500/20 px-3 py-1 font-medium text-indigo-300">
              ${item.source}
            </span>
            <span class="rounded-full px-3 py-1 font-medium ${getDocTypeColor(item.document_type)}">
              ${formatDocType(item.document_type)}
            </span>
            <span class="rounded-full px-3 py-1 font-medium ${getRelevanceColor(item.relevance)}">
              ${formatRelevance(item.relevance)}
            </span>
            <span class="text-white/40">
              ${formatDate(item.publication_date)}
            </span>
            ${getExpiryBadge(item.expiry_date)}
          </div>

          <!-- Title -->
          <h3 class="mb-2 text-lg font-semibold leading-snug text-white">
            ${item.source_url ? `<a href="${item.source_url}" target="_blank" class="hover:text-indigo-300 transition-colors">${item.title}</a>` : item.title}
          </h3>

          <!-- Theme Tags -->
          ${item.theme_tags && item.theme_tags.length > 0 ? `
            <div class="mb-3 flex flex-wrap gap-1">
              ${item.theme_tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
          ` : ''}

          <!-- Summary -->
          <div id="summary-${index}" class="line-clamp-3 text-sm leading-relaxed text-white/60 mb-3">
            ${item.summary}
          </div>

          <!-- Show more/less button -->
          <button
            id="toggle-${index}"
            onclick="toggleSummary(${index})"
            class="text-sm font-medium text-indigo-300 transition-all hover:text-indigo-200"
          >
            Show more
          </button>

          <!-- File name -->
          <div class="mt-3 text-xs text-white/40">
            ðŸ“„ ${item.file_name}
          </div>
        </div>
      `;
      }).join('');
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'Date unknown';
      try {
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { 
          year: 'numeric', 
          month: 'short', 
          day: 'numeric' 
        });
      } catch {
        return dateStr;
      }
    }

    // Initial render
    applyFilters();
  </script>
</body>
