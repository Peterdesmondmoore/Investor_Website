<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investor Anatomy</title>
  <link rel="icon" type="image/png" href="images/Favicon.png" />

  <!-- Netlify Identity Widget for Authentication -->
  <script defer src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Authentication System -->
  <script defer src="/js/auth-config.js"></script>
  <script defer src="/js/auth-guard.js"></script>
  <style>
    :root {
      --bg: #020617;
      --bg-soft: #020617;
      --card: #020617;
      --accent: #C4407C; /* Portfolio Characteristics (magenta) */
      --accent-soft: rgba(196, 64, 124, 0.16);
      --text-main: #f1f5f9; /* Signal white */
      --text-soft: #94a3b8; /* Slate */
      --border-subtle: #1f2937;
      --danger: #ef4444; /* Hot z-score */
      --positive: #3b82f6; /* Brand blue / cool */
      --warn: #fbbf24;    /* Gold highlight */
      --chip-bg: #020617;
    }

    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #0f172a 0, #020617 55%);
      color: var(--text-main);
    }

    a {
      color: #64748b; /* default link (slate) */
      text-decoration: none;
    }

    a:hover {
      color: var(--warn); /* highlighted (gold) */
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(2, 6, 23, 0.96);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border-subtle);
    }

    .nav-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      color: var(--text-soft);
    }

    .home-link {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border-subtle);
      background: var(--chip-bg);
      color: var(--text-soft);
    }

    .home-link:hover {
      border-color: var(--warn);
      color: var(--warn);
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .page-header {
      margin: 24px 0 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .title-block h1 {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.1rem);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 4px 0 0;
      max-width: 640px;
      font-size: 0.9rem;
      color: var(--text-soft);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
      font-size: 0.75rem;
      color: var(--text-soft);
      align-items: center;
    }

    .rule {
      border: none;
      border-top: 1px solid var(--border-subtle);
      margin: 0 0 18px;
    }

    .section {
      margin-bottom: 22px;
    }

    .section-header {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }

    .section-kicker {
      font-size: 0.75rem;
      color: var(--text-soft);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .section-title {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .box {
      background: radial-gradient(circle at top left, var(--accent-soft), var(--card));
      border-radius: 18px;
      padding: 16px 18px;
      border: 1px solid var(--border-subtle);
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.8);
    }

    .summary-box {
      font-size: 0.88rem;
      line-height: 1.6;
      color: var(--text-main);
      display: grid;
      gap: 12px;
    }

    .summary-box p {
      margin: 0 0 0.8rem;
    }

    .summary-box ul,
    .summary-box ol,
    .market-report ul,
    .market-report ol {
      margin: 0 0 0.8rem 1.25rem;
      padding-left: 1.25rem;
      list-style: disc;
    }

    .summary-box li {
      margin-bottom: 0.25rem;
    }

    .audio-episode {
      display: grid;
      grid-template-columns: minmax(140px, 180px) 1fr;
      gap: 16px;
      align-items: center;
    }

    .audio-cover {
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border-subtle);
      background: #0b1120;
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
    }

    .audio-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .audio-wrap {
      border-radius: 12px;
      border: 1px solid var(--border-subtle);
      padding: 12px 14px;
      background: linear-gradient(135deg, rgba(196, 64, 124, 0.12), rgba(2, 6, 23, 0.65));
      box-shadow: inset 0 0 0 1px rgba(196, 64, 124, 0.12);
      display: grid;
      gap: 8px;
      overflow: hidden;
    }

    .audio-body {
      display: grid;
      gap: 10px;
    }

    .audio-title {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .audio-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid var(--border-subtle);
      background: linear-gradient(135deg, rgba(196, 64, 124, 0.22), rgba(2, 6, 23, 0.8));
      color: var(--text-main);
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
      box-shadow: 0 14px 28px rgba(196, 64, 124, 0.22);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .audio-toggle:hover {
      border-color: var(--warn);
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(2, 6, 23, 0.8);
    }

    .audio-play {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #f9fafb;
      font-size: 0.75rem;
    }

    .audio-wave {
      position: relative;
      height: 34px;
      border-radius: 999px;
      background: repeating-linear-gradient(
        90deg,
        rgba(148, 163, 184, 0.28) 0 6px,
        transparent 6px 10px
      );
      border: 1px solid var(--border-subtle);
      overflow: hidden;
    }

    .audio-wave-progress {
      position: absolute;
      inset: 0;
      width: 0%;
      background: repeating-linear-gradient(
        90deg,
        rgba(196, 64, 124, 0.7) 0 6px,
        transparent 6px 10px
      );
      transition: width 0.15s linear;
    }

    .audio-time {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: var(--text-soft);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .audio-time-sep {
      opacity: 0.6;
    }

    .audio-wrap audio {
      display: none;
    }

    .article-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .article-link {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid var(--border-subtle);
      font-size: 0.8rem;
      text-decoration: none;
      background: var(--accent);
      color: #f9fafb;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
      box-shadow: 0 10px 30px rgba(196, 64, 124, 0.35);
    }

    .article-link:hover {
      background: #e11d48;
      transform: translateY(-1px);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.9);
    }

    .keyword {
      color: var(--warn);
      font-weight: 600;
    }

    @media (max-width: 720px) {
      .audio-episode {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <div>Macro Podcast Series</div>
    <a href="/index.html" class="home-link">&larr; Back to dashboard</a>
  </div>
</nav>

<main class="container">
  <header class="page-header">
    <div class="title-block">
      <h1>Macro Podcast Series</h1>
      <p class="subtitle">Cross-asset weekly notes</p>
    </div>
    <div class="meta-row">
      <div>As of 2025-01-10</div>
    </div>
  </header>

  <hr class="rule" />

  <section class="section"><div class="section-header"><div class="section-kicker">By: Investor Anatomy Research</div><h2 class="section-title">Cross Asset Positioning</h2></div><div class="box summary-box market-report"><div class="audio-wrap"><div class="audio-episode"><div class="audio-cover"><img src="/images/podcast/cross_asset_cover.jpg" alt="Cross Asset Positioning cover" /></div><div class="audio-body"><div class="audio-title">Cross Asset Positioning</div><button class="audio-toggle" type="button" aria-pressed="false"><span class="audio-play">&#9658;</span><span class="audio-toggle-text">Play</span></button><div class="audio-wave" aria-hidden="true"><div class="audio-wave-progress"></div></div><div class="audio-time"><span class="audio-time-current">0:00</span><span class="audio-time-sep">/</span><span class="audio-time-total">0:00</span></div><audio preload="metadata" src="/audio/podcasts/Copper_Analyst_Podcast.mp3"></audio></div></div></div><div class="article-row"><a class="article-link" href="/reports/cross_asset_positioning.html" target="_blank" rel="noopener">Open analysis</a></div><p>Summary text here...</p></div></section>
</main>
<script>
  function formatTime(seconds) {
    if (!Number.isFinite(seconds) || seconds < 0) {
      return "0:00";
    }
    var mins = Math.floor(seconds / 60);
    var secs = Math.floor(seconds % 60);
    return mins + ":" + String(secs).padStart(2, "0");
  }

  document.querySelectorAll(".audio-wrap").forEach(function (wrap) {
    var audio = wrap.querySelector("audio");
    var button = wrap.querySelector(".audio-toggle");
    var playIcon = wrap.querySelector(".audio-play");
    var playText = wrap.querySelector(".audio-toggle-text");
    var progress = wrap.querySelector(".audio-wave-progress");
    var timeCurrent = wrap.querySelector(".audio-time-current");
    var timeTotal = wrap.querySelector(".audio-time-total");

    if (!audio || !button || !progress || !timeCurrent || !timeTotal) {
      return;
    }

    button.addEventListener("click", function () {
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
    });

    audio.addEventListener("loadedmetadata", function () {
      timeTotal.textContent = formatTime(audio.duration);
    });

    audio.addEventListener("timeupdate", function () {
      if (audio.duration) {
        var pct = (audio.currentTime / audio.duration) * 100;
        progress.style.width = pct.toFixed(2) + "%";
      }
      timeCurrent.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener("play", function () {
      button.setAttribute("aria-pressed", "true");
      playIcon.textContent = "❚❚";
      playText.textContent = "Pause";
    });

    audio.addEventListener("pause", function () {
      button.setAttribute("aria-pressed", "false");
      playIcon.textContent = "▶";
      playText.textContent = "Play";
    });

    audio.addEventListener("ended", function () {
      progress.style.width = "0%";
      timeCurrent.textContent = "0:00";
    });
  });
</script>
</body>
</html>
