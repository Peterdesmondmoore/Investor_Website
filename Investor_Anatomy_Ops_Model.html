    PROMPT_CODEX_COMPAT_STRATEGY_UPDATE: `ROLE: Change-log + codex export generator.\n\nOBJECTIVE:\nTransform the latest Strategy Revalidation JSON into a Codex-executable update package for Investor Anatomy website + history. No new analysis.\n\nINPUTS PROVIDED TO YOU:\n- Prior strategy specification (current published version)\n- Latest revalidation JSON output\n- Website page template expectations\n\nSTRICT RULES:\n- Do not add narrative.\n- Use explicit deltas and deterministic language.\n- Output must be machine-readable and directly actionable by Codex.\n\nCONTEXT:\n- Strategy: {{strategy_name}} ({{strategy_id}})\n- Current version: {{version}}\n\nOUTPUT FORMAT (MANDATORY):\nReturn a single JSON object with keys:\n{\n  \'strategy_id\': \'...\',\n  \'new_version\': \'vX.Y\',\n  \'update_files\': [\n    { \'path\': \'/strategies/{{strategy_id}}/strategy.md\', \'mode\': \'replace\', \'content\': \'...\' },\n    { \'path\': \'/strategies/{{strategy_id}}/website.html\', \'mode\': \'replace\', \'content\': \'...\' },\n    { \'path\': \'/strategies/{{strategy_id}}/history.json\', \'mode\': \'append\', \'content\': { ... } }\n  ],\n  \'checks\': [\n    \'history_appended\',\n    \'version_incremented\',\n    \'strategy_page_updated\',\n    \'website_updated\'\n  ]\n}\n`,

      PROMPT_PODCAST_SCRIPT: `ROLE: Podcast script writer for strategy updates.\n\nOBJECTIVE:\nProduce a reference-free podcast script summarising what changed, why it changed (only using supplied deltas), and what to watch next.\n\nINPUTS PROVIDED TO YOU:\n- Final approved updated strategy (new version)\n- Change log entry (deltas)\n\nCONTEXT:\n- Strategy: {{strategy_name}}\n- Version: {{version}} → {{new_version}}\n\nOUTPUT FORMAT:\nPlain text, spoken style. No headings, no bullet points, no citations.\n`,

      PROMPT_ALLOCATION_RECONFIRM: `ROLE: Portfolio allocation confirmer.\n\nOBJECTIVE:\nReconfirm the allocation posture for this strategy given the updated strategy version.\n\nINPUTS PROVIDED TO YOU:\n- Updated strategy specification\n- Scenario probabilities\n- Portfolio constraints (if supplied)\n\nSTRICT RULES:\n- If portfolio constraints are missing, output a conditional decision.\n\nOUTPUT FORMAT (MANDATORY):\nReturn valid JSON:\n{\n  \'strategy_id\': \'...\',\n  \'as_of_date\': \'YYYY-MM-DD\',\n  \'allocation_posture\': \'Reconfirm|Adjust\',\n  \'target_band\': { \'min\': null, \'mid\': null, \'max\': null },\n  \'conditions\': [ ... ],\n  \'rationale_deltas_only\': [ ... ]\n}\n`
    };

    // --- Lightweight state store (localStorage) ---
    const STORE_KEY = "ia_strategy_ops_state_v1";

    function loadState() {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return { strategy: DEFAULT_STRATEGY };
      try {
        const parsed = JSON.parse(raw);
        // Merge defaults for forward compatibility
        return {
          strategy: {
            ...DEFAULT_STRATEGY,
            ...(parsed.strategy || {}),
            parameters: { ...DEFAULT_STRATEGY.parameters, ...((parsed.strategy||{}).parameters || {}) },
            prompts: { ...DEFAULT_STRATEGY.prompts, ...((parsed.strategy||{}).prompts || {}) },
            history: Array.isArray((parsed.strategy||{}).history) ? (parsed.strategy||{}).history : []
          }
        };
      } catch {
        return { strategy: DEFAULT_STRATEGY };
      }
    }

    function saveState(state) {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    // --- Template helpers ---
    function esc(s) {
      return String(s).replace(/[&<>"]+/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c] || c));
    }

    function fmtDate(d) {
      if (!d) return "—";
      const dt = new Date(d);
      if (Number.isNaN(dt.getTime())) return String(d);
      return dt.toISOString().slice(0,10);
    }

    function computeNextQuarterDate(fromDateISO) {
      const dt = fromDateISO ? new Date(fromDateISO) : new Date();
      const m = dt.getUTCMonth();
      const nextM = m + 3;
      dt.setUTCMonth(nextM);
      return dt.toISOString().slice(0,10);
    }

    function injectPrompt(promptText, strategy, extra = {}) {
      const map = {
        strategy_id: strategy.strategy_id,
        strategy_name: strategy.strategy_name,
        asset_theme: strategy.asset_theme,
        strategy_type: strategy.strategy_type,
        version: strategy.version,
        tickers: (strategy.parameters?.tickers || []).join(", "),
        benchmark: strategy.parameters?.benchmark || "",
        scenario_horizon: strategy.parameters?.scenario_horizon || "",
        ...extra
      };
      return promptText.replace(/\{\{(.*?)\}\}/g, (_, k) => esc(map[String(k).trim()] ?? ""));
    }

    function card(title, subtitle, innerHtml) {
      return `
        <section class="rounded-2xl border border-slate-800 bg-slate-900/30 p-5">
          <div class="flex items-start justify-between gap-4">
            <div>
              <div class="text-lg font-semibold">${esc(title)}</div>
              ${subtitle ? `<div class="text-sm text-slate-400 mt-1">${esc(subtitle)}</div>` : ""}
            </div>
          </div>
          <div class="mt-4">${innerHtml}</div>
        </section>
      `;
    }

    function promptBox(label, promptText) {
      const id = "p_" + Math.random().toString(16).slice(2);
      return `
        <div class="rounded-2xl border border-slate-800 bg-slate-950/40">
          <div class="flex items-center justify-between px-4 py-3 border-b border-slate-800">
            <div class="text-sm font-semibold">${esc(label)}</div>
            <div class="flex items-center gap-2">
              <button data-copy="${id}" class="text-xs px-3 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-700">Copy</button>
            </div>
          </div>
          <textarea id="${id}" class="w-full min-h-[240px] bg-transparent p-4 text-xs text-slate-200 outline-none" spellcheck="false">${esc(promptText)}</textarea>
        </div>
      `;
    }

    // --- Views ---
    function viewHub(state) {
      const s = state.strategy;
      const body = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <a href="#/revalidation" class="rounded-2xl border border-slate-800 bg-slate-900/30 p-5 hover:bg-slate-900/50">
            <div class="text-xs text-slate-400">Continuous</div>
            <div class="text-lg font-semibold mt-1">1. Research</div>
            <div class="text-sm text-slate-400 mt-2">Identify emerging asymmetric risks and opportunities.</div>
          </a>
          <a href="#/strategy-creation" class="rounded-2xl border border-slate-800 bg-slate-900/30 p-5 hover:bg-slate-900/50">
            <div class="text-xs text-slate-400">Reassessment</div>
            <div class="text-lg font-semibold mt-1">3. Investment Strategy Creation</div>
            <div class="text-sm text-slate-400 mt-2">Reassess and revise strategy assumptions, scenarios, and risk expectations.</div>
          </a>
          <a href="#/allocation" class="rounded-2xl border border-slate-800 bg-slate-900/30 p-5 hover:bg-slate-900/50">
            <div class="text-xs text-slate-400">Decision</div>
            <div class="text-lg font-semibold mt-1">4. Portfolio Design</div>
            <div class="text-sm text-slate-400 mt-2">The balanced diversification of capital across assets.</div>
          </a>
        </div>
      `;

      return [
        body
      ].join("\n");
    }

    function viewRevalidation(state) {
      const s = state.strategy;
      const promptKey = s.prompts.revalidation;
      const prompt = injectPrompt(PROMPTS[promptKey], s);

      const body = `
        <div class="grid grid-cols-1 gap-4">
          ${card("Step 1 — Asymmetric Risk and Opportunity Evaluation", "Execute on an ad hoc basis to support evaluation asymmetric risks and opportunities. Execute during periods of uncertainty or capital market stress.", `
            <div class="text-sm text-slate-300">
              <div class="rounded-xl border border-slate-800 bg-slate-950/40 p-4">
                <div class="text-xs text-slate-400">Inputs you provide each run</div>
                <ul class="mt-2 list-disc pl-5 space-y-1">
                  <li>Investor Anatomy Macro Reports (10)</li>
                  <li>Federal Reserve Watcher Consolidated Report (1)</li>
                </ul>
              </div>
            </div>
            <div class="mt-4">${promptBox("Asymmetric Risk & Opportunity Prompt", prompt)}</div>
          `)}
          ${card("Step 2 : Strategy (Re)evaluation", "On a monthly basis, identify strategies to reassess using standardized inputs and structure.", `
            <div class="text-sm text-slate-300">
              <div class="rounded-xl border border-slate-800 bg-slate-950/40 p-4">
                <div class="text-xs text-slate-400">Inputs you provide each run</div>
                <ul class="mt-2 list-disc pl-5 space-y-1">
                  <li>Federal Reserve Watcher Consolidated Report (1)</li>
                  <li>Investor Anatomy US Macro Report (1)</li>
                  <li>Asymmetric Risk and Opportunity Register (1)</li>
                  <li>Strategy - for re-valuation only(1)</li>
                </ul>
              </div>
            </div>
            <div class="mt-4">${promptBox("Standard (Re)evaluation Prompt", injectPrompt(PROMPTS["PROMPT_INVESTMENT_STRATEGY_CREATION"], s))}</div>
          `)}
          ${card("Step 3A : Strategy Update Specification", "Generate a deterministic change log from Step 2 outputs. This change log is used to enhance the Strategy webpage.", `
            <div class="text-sm text-slate-300">
              <div class="rounded-xl border border-slate-800 bg-slate-950/40 p-4">
                <div class="text-xs text-slate-400">Inputs you provide each run</div>
                <ul class="mt-2 list-disc pl-5 space-y-1">
                  <li>Strategy (Re)evaluation (Step 2)</li>
                </ul>
              </div>
            </div>
            <div class="mt-4">${promptBox("Standard (Re)evaluation Prompt", injectPrompt(PROMPTS["PROMPT_STRATEGY_CHANGE_LOG"], s))}</div>
          `)}
          ${card("Step 3B : Create New Strategy", "Produce a website-ready strategy specification from Step 2 outputs. The specifiation is fed into Codex to generate a custom webpage", `
            <div class="text-sm text-slate-300">
              <div class="rounded-xl border border-slate-800 bg-slate-950/40 p-4">
                <div class="text-xs text-slate-400">Inputs you provide each run</div>
                <ul class="mt-2 list-disc pl-5 space-y-1">
                  <li>Strategy (Re)evaluation (Step 2)</li>
                </ul>
              </div>
            </div>
            <div class="mt-4">${promptBox("Standard Prompt: Strategy Specification", injectPrompt(PROMPTS["PROMPT_STRATEGY_SPECIFICATION"], s))}</div>
          `)}
          ${card("Step 4 : Podcast", "Generate a spoken analytical briefing from the latest outputs.", `
            <div class="text-sm text-slate-300">
              <div class="rounded-xl border border-slate-800 bg-slate-950/40 p-4">
                <div class="text-xs text-slate-400">Inputs you provide each run</div>
                <ul class="mt-2 list-disc pl-5 space-y-1">
                  <li>Analysis for evaluation</li>
                </ul>
              </div>
            </div>
            <div class="mt-4">${promptBox("Standard Prompt: Podcast Briefing", injectPrompt(PROMPTS["PROMPT_PODCAST_BRIEFING"], s))}</div>
          `)}

        </div>
      `;

      return body;
    }

    function viewUpdate(state) {
      const s = state.strategy;
      const promptKey = s.prompts.codex_export;
      const prompt = injectPrompt(PROMPTS[promptKey], s);

      const body = `
        ${card("Step 2 — Strategy Update", "Two-step: ChatGPT emits Codex package → Codex updates website + history.", `
          <div class="grid grid-cols-1 gap-4">
            <div class="rounded-2xl border border-slate-800 bg-slate-950/40 p-4">
              <div class="text-sm font-semibold">2A — ChatGPT → Codex-compatible update package</div>
              <div class="text-sm text-slate-400 mt-1">Paste the prior spec + revalidation JSON into ChatGPT, run this prompt, and use the resulting JSON as the Codex input.</div>
              <div class="mt-3">${promptBox("Standard Prompt: Codex-Compatible Strategy Update", prompt)}</div>
            </div>

            <div class="rounded-2xl border border-slate-800 bg-slate-950/40 p-4">
              <div class="text-sm font-semibold">2B — Codex execution (website + history)</div>
              <div class="text-sm text-slate-400 mt-1">Codex applies file updates deterministically. Suggested paths:</div>
              <pre class="mt-3 text-xs bg-slate-950/60 border border-slate-800 rounded-xl p-3 overflow-auto">/strategies/${esc(s.strategy_id)}/strategy.md\n/strategies/${esc(s.strategy_id)}/website.html\n/strategies/${esc(s.strategy_id)}/history.json</pre>
              <div class="mt-3 text-sm text-slate-300">
                Ensure the Codex package includes: version increment, history append, and website content replacement.
              </div>
            </div>
          </div>
        `)}
      `;

      return body;
    }
    function viewStrategyCreation(state) {
      const s = state.strategy;
      const prompt = injectPrompt(PROMPTS["PROMPT_INVESTMENT_STRATEGY_CREATION"], s);

      const body = `
        ${card("Step 3 - Investment Strategy Creation", "Reassess or revise the strategy using current inputs and standardized structure.", `
          <div class="rounded-xl border border-slate-800 bg-slate-950/40 p-4 text-sm text-slate-300">
            Inputs: existing strategy specification, latest metrics (prices, demand, supply), scenario probabilities, and return assumptions.
          </div>
          <div class="mt-4">${promptBox("Standard Prompt: Investment Strategy Creation", prompt)}</div>
        `)}
      `;

      return body;
    }


    function viewPodcast(state) {
      const s = state.strategy;
      const promptKey = s.prompts.podcast;
      const prompt = injectPrompt(PROMPTS[promptKey], s, { new_version: "vX.Y" });

      const body = `
        ${card("Step 4A — Podcast", "Generate a reference-free podcast script after the strategy update is approved.", `
          <div class="rounded-xl border border-slate-800 bg-slate-950/40 p-4 text-sm text-slate-300">
            Input: final updated strategy version + change log entry. Output: plain text, spoken style.
          </div>
          <div class="mt-4">${promptBox("Standard Prompt: Podcast Script", prompt)}</div>
        `)}
      `;

      return body;
    }

    function viewAllocation(state) {
      const s = state.strategy;
      const promptKey = s.prompts.allocation;
      const prompt = injectPrompt(PROMPTS[promptKey], s);

      const body = `
        ${card("Step 4B — Asset Allocation Reconfirmation", "Confirm or adjust posture after the updated strategy is produced.", `
          <div class="rounded-xl border border-slate-800 bg-slate-950/40 p-4 text-sm text-slate-300">
            Input: updated strategy specification + scenario probabilities + portfolio constraints (if available).
          </div>
          <div class="mt-4">${promptBox("Standard Prompt: Allocation Reconfirmation", prompt)}</div>
        `)}
      `;

      return body;
    }


    // --- Router ---
    const ROUTES = {
      "/hub": viewHub,
      "/revalidation": viewRevalidation,
      "/update": viewUpdate,
      "/strategy-creation": viewStrategyCreation,
      "/podcast": viewPodcast,
      "/allocation": viewAllocation
    };

    function setNavActive(path) {
      document.querySelectorAll(".navlink").forEach(a => {
        const href = a.getAttribute("href") || "";
        const isActive = href === `#${path}`;
        a.classList.toggle("bg-slate-800/60", isActive);
        a.classList.toggle("border-slate-700", isActive);
      });
    }

    function render() {
      const state = loadState();
      const hash = location.hash || "#/hub";
      const path = hash.replace(/^#/, "");
      const fn = ROUTES[path] || viewHub;
      setNavActive(path);
      document.getElementById("view").innerHTML = fn(state);

      wireCopyButtons();
    }

    function wireCopyButtons() {
      document.querySelectorAll("button[data-copy]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-copy");
          const el = document.getElementById(id);
          if (!el) return;
          el.select();
          document.execCommand("copy");
          btn.textContent = "Copied";
          setTimeout(() => (btn.textContent = "Copy"), 900);
        });
      });
    }

    window.addEventListener("hashchange", render);
    render();
  </script>
</body>
</html>
