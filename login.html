<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investor Anatomy | Login</title>
  <meta name="description" content="Login to Investor Anatomy to access gated signals, research reports, and strategy tools." />
  <link rel="icon" type="image/png" href="images/Favicon.png" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    :root {
      --bg-primary: #0b1220;
      --bg-secondary: #121b2d;
      --bg-elevated: #172236;
      --bg-accent: #231a3f;
      --text-primary: #f3f4f6;
      --text-muted: #9ca3af;
      --border-subtle: #2a3648;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --accent-gold: #fbbf24;
      --success: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: var(--accent-blue);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .page {
      min-height: 100vh;
      background:
        radial-gradient(800px 500px at 10% 10%, rgba(59, 130, 246, 0.12), transparent 65%),
        radial-gradient(900px 500px at 90% 0%, rgba(139, 92, 246, 0.14), transparent 60%),
        linear-gradient(180deg, #0b1220 0%, #0d1628 60%, #101b30 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: 0.35;
    }

    .shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 90px 18px 24px;
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: calc(100vh - 72px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-layout {
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
    }

    .hero-card {
      border: 1px solid var(--border-subtle);
      background: linear-gradient(145deg, rgba(23, 34, 54, 0.95), rgba(13, 22, 39, 0.96));
      border-radius: 20px;
      box-shadow: 0 22px 40px rgba(0, 0, 0, 0.45);
    }

    .hero-card {
      padding: 30px 28px;
      min-height: 100%;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #93c5fd;
      margin-bottom: 14px;
    }

    .eyebrow-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent-gold);
      box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.2);
    }

    .hero-title {
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(1.65rem, 3.2vw, 2.35rem);
      line-height: 1.25;
      margin: 0 0 14px;
      color: #ffffff;
      font-weight: 500;
    }

    .hero-copy {
      margin: 0;
      font-family: "Playfair Display", Georgia, serif;
      font-size: 1.08rem;
      line-height: 1.7;
      color: #93c5fd;
    }

    .hero-copy + .hero-copy {
      margin-top: 12px;
    }

    .hero-highlight {
      color: #a78bfa;
      font-weight: 600;
    }

    .auth-status {
      margin: 0 0 14px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #2a3648;
      background: rgba(11, 18, 32, 0.7);
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.4;
    }

    .auth-status.is-ok {
      border-color: rgba(34, 197, 94, 0.5);
      background: rgba(34, 197, 94, 0.12);
      color: #bbf7d0;
    }

    .auth-status.is-warn {
      border-color: rgba(239, 68, 68, 0.45);
      background: rgba(239, 68, 68, 0.12);
      color: #fecaca;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 24px 0 24px;
      justify-content: center;
    }

    .btn {
      appearance: none;
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn:hover {
      text-decoration: none;
      transform: translateY(-1px);
    }

    .btn-primary {
      color: #000;
      border-color: rgba(251, 191, 36, 0.5);
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
      min-width: 320px;
      max-width: 100%;
    }

    .btn[disabled] {
      opacity: 0.5;
      cursor: default;
      transform: none;
      box-shadow: none;
    }

    /* NAVIGATION HEADER */
    .nav-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: transparent;
      border-bottom: 1px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Playfair Display", Georgia, serif;
      z-index: 100;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .nav-header.scrolled {
      background: var(--bg-secondary);
      border-bottom: 1px solid #2a3644;
    }

    .nav-header-inner {
      max-width: 1120px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
    }

    .nav-brand {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
    }

    .nav-brand:hover {
      color: var(--accent-purple);
      text-decoration: none;
    }

    .nav-menu-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid #2a3644;
      background: rgba(42, 54, 68, 0.5);
      color: #e5e7eb;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s ease;
    }

    .nav-menu-btn:hover {
      background: rgba(42, 54, 68, 0.8);
    }

    .nav-menu-label {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 11px;
      color: #9ca3af;
    }

    .nav-menu-icon {
      display: inline-flex;
      flex-direction: column;
      gap: 3px;
    }

    .nav-menu-icon span {
      display: block;
      width: 16px;
      height: 2px;
      border-radius: 999px;
      background: var(--text-primary);
      transition: transform 0.22s ease, opacity 0.18s ease, width 0.18s ease;
    }

    .nav-menu-btn.is-open .nav-menu-icon span:nth-child(1) {
      transform: translateY(5px) rotate(45deg);
      width: 16px;
    }

    .nav-menu-btn.is-open .nav-menu-icon span:nth-child(2) {
      opacity: 0;
      width: 0;
    }

    .nav-menu-btn.is-open .nav-menu-icon span:nth-child(3) {
      transform: translateY(-5px) rotate(-45deg);
      width: 16px;
    }

    .ia-nav-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.65);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease-out;
      backdrop-filter: blur(3px);
      z-index: 40;
    }

    .ia-nav-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .ia-nav-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: 300px;
      max-width: 82vw;
      background: var(--bg-elevated);
      border-left: 1px solid #111827;
      box-shadow: -24px 0 60px rgba(0,0,0,0.85);
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.22, 0.61, 0.36, 1);
      z-index: 50;
      display: flex;
      flex-direction: column;
      padding: 18px 20px 20px;
      font-family: "Playfair Display", Georgia, serif;
    }

    .ia-nav-panel.open {
      transform: translateX(0);
    }

    .ia-nav-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .ia-nav-panel-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #9ca3af;
    }

    .ia-nav-close {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 1px solid #1f2937;
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }

    .ia-nav-close span {
      position: absolute;
      width: 14px;
      height: 2px;
      border-radius: 999px;
      background: var(--text-primary);
    }

    .ia-nav-close span:first-child {
      transform: rotate(45deg);
    }

    .ia-nav-close span:last-child {
      transform: rotate(-45deg);
    }

    .ia-nav-panel-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 6px;
    }

    .ia-nav-link {
      font-size: 15px;
      font-weight: 500;
      color: #e5e7eb;
      padding: 6px 0;
    }

    .ia-nav-link:hover {
      color: #facc15;
      text-decoration: none;
    }

    .nav-section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #9ca3af;
      padding: 12px 0 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-section-title:hover {
      color: #e5e7eb;
    }

    .nav-section-arrow {
      transition: transform 0.2s ease;
    }

    .nav-section-arrow.open {
      transform: rotate(180deg);
    }

    .nav-section-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .nav-section-content.open {
      max-height: 500px;
    }

    .nav-section-content .ia-nav-link {
      padding-left: 12px;
    }

    .login-highlight {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #000;
      font-weight: 700;
      padding: 10px 16px;
      border-radius: 999px;
      text-align: center;
      margin-top: 8px;
    }

    .login-highlight:hover {
      background: linear-gradient(135deg, #f59e0b, #fbbf24);
      color: #000;
      transform: translateY(-1px);
    }

    .nav-note {
      font-size: 12px;
      color: #9ca3af;
      padding: 8px 12px;
      margin: 8px 0;
      border-left: 2px solid #3b82f6;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 4px;
      line-height: 1.4;
    }

    .universal-footer {
      position: relative;
      margin-top: 0;
      padding: 16px 18px 10px;
      border-top: 1px solid var(--border-subtle);
      color: var(--text-muted);
      width: 100%;
      background: var(--bg-secondary);
      z-index: 1;
    }

    .universal-footer-inner {
      max-width: 1120px;
      margin: 0 auto;
    }

    .universal-footer-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .universal-footer-brand {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }

    .universal-footer-brand:hover {
      color: var(--accent-purple);
      text-decoration: none;
    }

    .universal-footer-linkedin {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 46px;
      height: 46px;
      border-radius: 999px;
      border: 1px solid #2a3644;
      background: #ffffff;
      text-decoration: none;
    }

    .universal-footer-disclaimer {
      margin: 0 0 8px;
      font-size: 11px;
      line-height: 1.5;
      color: var(--text-muted);
    }

    .universal-footer-copyright {
      margin: 0;
      font-size: 11px;
      color: var(--text-muted);
    }

    @media (max-width: 980px) {
      .hero-card {
        padding: 24px 22px;
      }

      .shell {
        min-height: calc(100vh - 64px);
        padding: 88px 16px 20px;
      }
    }

    @media (max-width: 768px) {
      .nav-brand {
        font-size: 16px;
      }

      .nav-menu-btn {
        padding: 6px 12px;
      }

      .universal-footer-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .action-row {
        flex-direction: column;
      }

      .action-row .btn {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div data-include-nav></div>

  <div class="page">
    <main class="shell">
      <div class="login-layout">
        <section class="hero-card" aria-labelledby="login-hero-title">
          <div class="eyebrow">
            <span class="eyebrow-dot" aria-hidden="true"></span>
            Member Access
          </div>
          <h1 class="hero-title" id="login-hero-title">You have been invited to Investor Anatomy premium content</h1>
          <p class="hero-copy">
            Sign in to access <span class="hero-highlight">premium signals</span>, research dashboards, and gated strategy outputs.
          </p>
          <p class="hero-copy">
            Once logged in, you will stay on this page.
          </p>
          <div class="action-row">
            <button class="btn btn-primary" id="open-login-btn" type="button">Login</button>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div data-include-footer></div>

  <script src="/shared/layout-loader.js"></script>
  <script>
    (function() {
      var statusEl = document.getElementById("auth-status");
      var openLoginBtn = document.getElementById("open-login-btn");
      var currentUser = null;

      function setStatus(message, tone) {
        if (!statusEl) return;
        statusEl.textContent = message;
        statusEl.classList.remove("is-ok", "is-warn");
        if (tone === "ok") statusEl.classList.add("is-ok");
        if (tone === "warn") statusEl.classList.add("is-warn");
      }

      function setNavAuthUI(user) {
        var loginBtn = document.getElementById("login-btn");
        var logoutBtn = document.getElementById("logout-btn");
        var isAuthed = Boolean(user);

        if (loginBtn) {
          loginBtn.style.display = isAuthed ? "none" : "block";
          loginBtn.onclick = function(evt) {
            evt.preventDefault();
            if (window.netlifyIdentity) {
              window.netlifyIdentity.open();
            }
          };
        }

        if (logoutBtn) {
          logoutBtn.style.display = isAuthed ? "block" : "none";
        }
      }

      function setUIForUser(user) {
        currentUser = user || null;
        setNavAuthUI(currentUser);

        if (currentUser) {
          var email = currentUser.email || "Authenticated user";
          setStatus("Signed in as " + email, "ok");
          if (openLoginBtn) {
            openLoginBtn.textContent = "logout";
          }
        } else {
          setStatus("Not signed in. Use secure login to continue.", "");
          if (openLoginBtn) {
            openLoginBtn.textContent = "Login";
          }
        }
      }

      function initIdentity() {
        if (!window.netlifyIdentity) {
          setStatus("Netlify Identity is unavailable. Confirm Identity is enabled for this project.", "warn");
          if (openLoginBtn) {
            openLoginBtn.disabled = true;
          }
          return;
        }

        window.netlifyIdentity.on("init", function(user) {
          setUIForUser(user || null);
        });

        window.netlifyIdentity.on("login", function(user) {
          window.netlifyIdentity.close();
          setUIForUser(user || null);
        });

        window.netlifyIdentity.on("logout", function() {
          setUIForUser(null);
        });

        if (typeof window.netlifyIdentity.currentUser === "function") {
          setUIForUser(window.netlifyIdentity.currentUser());
        }
      }

      if (openLoginBtn) {
        openLoginBtn.addEventListener("click", function() {
          if (!window.netlifyIdentity) {
            return;
          }

          if (currentUser) {
            window.netlifyIdentity.logout();
          } else {
            window.netlifyIdentity.open();
          }
        });
      }

      document.addEventListener("ia:layout-ready", function() {
        setNavAuthUI(currentUser);
      });

      setUIForUser(null);
      initIdentity();
    })();
  </script>
</body>
</html>
