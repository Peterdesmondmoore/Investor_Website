ck off the new year with an update on the state of the gold market, exploring the factors influencing gold prices, including geopolitical tensions and ongoing economic conditions.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: 3 ATHs, 2 weeks, 1 message", "link": "https://www.gold.org/goldhub/gold-focus/2026/01/weekly-markets-monitor-3-aths-2-weeks-1-message", "pubDate": "Mon, 12 Jan 2026 11:30:00 GMT", "description": "Last week’s data highlighted diverging global trends: the US saw softer labor and manufacturing but resilient services and improved sentiments; the Eurozone witnessed easing inflation and stronger retail sales; and in Asia, Japan’s consumption picked up, India’s growth outlook was upgraded, and deflation worries lingered in China.", "relevance_score": 20.0, "matched_keywords": ["Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "The Supreme Court’s Review of IEEPA Tariffs: Why it matters to the gold market (or does it?)", "link": "https://www.gold.org/goldhub/gold-focus/2026/01/supreme-courts-review-ieepa-tariffs-why-it-matters-gold-market", "pubDate": "Thu, 08 Jan 2026 09:00:00 GMT", "description": "The gold market faced significant developments throughout 2025 as participants responded to evolving drivers, including US tariff policies. After considerable uncertainty, the White House clarified that gold imported for investment purposes would be exempt from tariffs under the International Emergency Economic Powers Act (IEEPA).", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "December caps off a record year", "link": "https://www.gold.org/goldhub/research/gold-etfs-holdings-and-flows/2026/01", "pubDate": "Thu, 08 Jan 2026 12:00:00 UTC", "description": "Global physically backed gold ETFs extended their inflow streak to seven months, adding US$10bn in December – all regions experienced inflows with North America (+US$6bn) and Asia (+US$2.5bn) taking the charge.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Gold Market Commentary: Precious Metal Thunder", "link": "https://www.gold.org/goldhub/research/gold-market-commentary-december-2025", "pubDate": "Thu, 08 Jan 2026 12:00:00 UTC", "description": "Gold tagged its 53rd all-time PM price high for the year of US$4,449/oz on 23 December, before closing the year at US$4,368/oz. It was a stellar finish to a stellar year – posting a December return of 4.2% to take the full year return to 67%. Relatively stable FX led to similar returns across major currencies.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "You asked, we answered:  Is mined gold production peaking?", "link": "https://www.gold.org/goldhub/gold-focus/2026/01/you-asked-we-answered-mined-gold-production-peaking", "pubDate": "Wed, 07 Jan 2026 13:30:00 GMT", "description": "Global gold mining has been stable in recent years. Despite short-term impacts stemming from the pandemic, safety stoppages and industrial action, mined gold production averaged a near zero annual y/y change between 2018 and 2024.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Central bank gold statistics: Buying momentum continues into November", "link": "https://www.gold.org/goldhub/gold-focus/2026/01/central-bank-gold-statistics-buying-momentum-continues-november", "pubDate": "Tue, 06 Jan 2026 09:00:00 GMT", "description": "Central banks bought a net 45t in November, and while down slightly from October, buying has remained elevated compared to the earlier months of this year. National Bank of Poland led net buying for the second consecutive month after October’s resurgent buying from the bank.", "relevance_score": 30.0, "matched_keywords": ["Gold", "Central Bank"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: Venezuela’s ripple effect", "link": "https://www.gold.org/goldhub/gold-focus/2026/01/weekly-markets-monitor-venezuelas-ripple-effect", "pubDate": "Mon, 05 Jan 2026 11:25:00 GMT", "description": "Last week, US data showed strong jobs and housing trends amid a widening FOMC policy divide. In the Eurozone, inflation eased while manufacturing contracted. In Asia, China’s factory activity rebounded, yet India’s PMI hit a two-year low.", "relevance_score": 20.0, "matched_keywords": ["Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: A season for Kevin?", "link": "https://www.gold.org/goldhub/gold-focus/2025/12/weekly-markets-monitor-season-kevin", "pubDate": "Mon, 22 Dec 2025 10:00:00 GMT", "description": "Last week saw diverging data and policy action: the ECB and Nordic banks held rates, the BoE cut, and the BoJ hiked. In the US, jobs rebounded and inflation eased, but consumer spending and housing remained tight, while China’s economic momentum slowed.", "relevance_score": 20.0, "matched_keywords": ["Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "You asked, we answered: Is gold’s appeal fading on rising vol?", "link": "https://www.gold.org/goldhub/gold-focus/2025/12/you-asked-we-answered-golds-appeal-fading-rising-vol", "pubDate": "Fri, 19 Dec 2025 12:00:00 GMT", "description": "While gold’s volatility rose in 2025, it did so from a low base and in line with other assets; gold’s vol seems to have normalized, remaining broadly in line with long-term averages.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Unearthed: Gold's Breakout Year & Outlook for 2026", "link": "https://www.gold.org/goldhub/gold-focus/2025/12/unearthed-golds-breakout-year-outlook-2026", "pubDate": "Thu, 18 Dec 2025 12:00:00 GMT", "description": "In this year-end episode of Unearthed, Joe Cavatoni and John Reade, Senior Market Strategists at the World Gold Council, recap an extraordinary 2025 for gold, marked by more than 50 all-time highs and ending the year comfortably above US$ 4,000/oz.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "India gold market update: Investment-led support", "link": "https://www.gold.org/goldhub/gold-focus/2025/12/india-gold-market-update-investment-led-support", "pubDate": "Wed, 17 Dec 2025 09:00:00 GMT", "description": "The inauspicious period from mid-December to mid-January is likely to weigh on jewellery demand, while investment interest is expected to be sustained.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: Top of the morning", "link": "https://www.gold.org/goldhub/gold-focus/2025/12/weekly-markets-monitor-top-morning", "pubDate": "Mon, 15 Dec 2025 10:25:00 GMT", "description": "Last week was a busy period for central banks: the Fed cut as expected while the Bank of Canada, Reserve Bank of Australia, and Swiss National Bank held rates steady.", "relevance_score": 30.0, "matched_keywords": ["Weekly Markets Monitor", "Central Bank"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "China gold market update: November demand feels the VAT reform", "link": "https://www.gold.org/goldhub/gold-focus/2025/12/china-gold-market-update-november-demand-feels-vat-reform", "pubDate": "Fri, 12 Dec 2025 14:00:00 GMT", "description": "The recent VAT reform weighed on China’s gold jewellery demand in November, denting gold withdrawals from the Shanghai Gold Exchange despite robust investment buying. Gold ETFs in China continued to attract notable inflows in the month and the PBoC reported gold purchases 13 months in a row.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Unearthed: Wholesale Digital Gold ft. Allan Guild, Hilltop Walk Consulting", "link": "https://www.gold.org/goldhub/gold-focus/2025/12/unearthed-wholesale-digital-gold-ft.-allan-guild-hilltop-walk-consulting", "pubDate": "Fri, 12 Dec 2025 13:00:00 GMT", "description": "In this episode of Unearthed, hosts Joe Cavatoni and John Reade, Senior Market Strategists at the World Gold Council, are joined by Allan Guild, Director at Hilltop Walk Consulting and long-time partner to the World Gold Council.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Central bank considerations when pricing ASGM purchases", "link": "https://www.gold.org/goldhub/research/central-bank-considerations-when-pricing-asgm-purchases", "pubDate": "Tue, 09 Dec 2025 12:00:00 UTC", "description": "The strength of world gold prices has enhanced both the level and the value of Artisanal and Small-Scale Gold Mining (ASGM) in countries around the world. This presents challenges to societies and governments on a range of issues related to ASGM mining, such as environmental, societal, legal, regulatory and economic. Several papers exist that cover these issues, the government response to which may be a State Gold Buying Program (SGBP). The purpose of this paper – whilst acknowledging the issues outlined above – is to examine the price-setting process for central banks in a SGBP.", "relevance_score": 30.0, "matched_keywords": ["Gold", "Central Bank"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: The 2026 gold outlook", "link": "https://www.gold.org/goldhub/gold-focus/2025/12/weekly-markets-monitor-2026-gold-outlook", "pubDate": "Mon, 08 Dec 2025 11:00:00 GMT", "description": "Last week highlighted sectoral divergence: services remained resilient while manufacturing struggled in major economies.", "relevance_score": 40.0, "matched_keywords": ["Gold", "Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Asia takes the helm", "link": "https://www.gold.org/goldhub/research/gold-etfs-holdings-and-flows/2025/12", "pubDate": "Fri, 05 Dec 2025 12:00:00 UTC", "description": "Global physically backed gold ETFs saw inflows six months in a row, adding US$5.2bn in November. Asian investors (+US$3.2bn) bought the most whilst North America (+US$1.1bn) and Europe (US$978mn) also experienced positive flows. Persistent inflows and a rising gold price pushed global gold ETFs’ total AUM to another month-end peak of US$530bn, 5% higher m/m. Continued gold ETF buying also pushed their collective holdings to 3,932t, the highest month-end value on record.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "2026年の金の見通し：前進か、後退か", "link": "https://www.gold.org/ja/goldhub/research/gold-outlook-2026", "pubDate": "Thu, 04 Dec 2025 12:00:00 UTC", "description": "金にとって2025年は、史上最高値を50回以上記録し、60％を超えるリターンを達成するなど目覚ましい一年となりました。そのパフォーマンスを下支えしたのは、地政学的不確実性と経済的不確実性の高まり、米ドル安、そしてポジティブな価格モメンタムでした。", "relevance_score": 0.0, "matched_keywords": []}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Gold Outlook 2026: Push ahead or pull back", "link": "https://www.gold.org/goldhub/research/gold-outlook-2026", "pubDate": "Thu, 04 Dec 2025 12:00:00 UTC", "description": "Gold has experienced a remarkable 2025, achieving over 50 all-time highs and returning more than 60% as of the end of November, driven by heightened risk, dollar weakness and price momentu s in the US, raising expectations of a December rate cut. In Europe, near-target inflation lowered expectations of an ECB cut while UK tax hikes weighed on growth forecasts.", "relevance_score": 20.0, "matched_keywords": ["Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Indonesia Consumer Insights Report: Gold for the Nation", "link": "https://www.gold.org/goldhub/research/indonesia-consumer-insights-report-gold-nation", "pubDate": "Fri, 28 Nov 2025 12:00:00 UTC", "description": "Indonesia is home to approximately 284 million people spread across its 38 provinces. Within this vast social fabric, gold has long been regarded as an investment asset in Indonesian households, typically in the form of heirloom jewellery passed down from one generation to the next, or in modern-day gold bars and coins. Gold’s enduring appeal reflects both cultural tradition and a deep-rooted belief in its role as a secure and lasting store of value.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: AI fears and the Special K", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/weekly-markets-monitor-ai-fears-and-special-k", "pubDate": "Mon, 24 Nov 2025 11:00:00 GMT", "description": "Last week’s economic signals were mixed: the US posted uneven data but record corporate profits; the Eurozone maintained steady growth, but the UK economy weakened.", "relevance_score": 20.0, "matched_keywords": ["Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Unearthed: Navigating gold prices - What lies ahead?", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/unearthed-navigating-gold-prices-what-lies-ahead", "pubDate": "Fri, 21 Nov 2025 10:00:00 GMT", "description": "In this episode of Unearthed, hosts John Reade and Joseph Cavatoni, Senior Market Strategists at the World Gold Council, discuss the recent developments in the gold market, including price movements, the impact of political events in Washington, and predictions for the end of 2025.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "India gold market update: Seasonal strength", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/india-gold-market-update-seasonal-strength", "pubDate": "Fri, 21 Nov 2025 09:00:00 GMT", "description": "The busy wedding season over the coming months (November–March), with a high number of anticipated weddings, is expected to support jewellery demand. Investment interest in gold is likely to persist amid broadly bullish sentiment around gold.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "China gold market update: October's unseasonable strength", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/china-gold-market-update-octobers-unseasonable-strength", "pubDate": "Tue, 18 Nov 2025 12:00:00 GMT", "description": "Supported by investment strength, wholesale gold demand in China rose m/m and y/y during October, defying the seasonal weakness. Local gold ETFs also saw notable inflows, generally tracking the gold price. Meanwhile, the PBoC reported its 12th consecutive monthly gold purchase. Looking ahead, the VAT reform in China’s gold market may insert profound impact on different sectors of local gold demand.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: Return of the Mac(ro)", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/weekly-markets-monitor-return-macro", "pubDate": "Mon, 17 Nov 2025 11:30:00 GMT", "description": "Last week marked the end of the longest US government shutdown, while economic updates from major economies painted a mixed picture. Meanwhile, expectations for further Fed rate cuts waned after hawkish comments from officials.", "relevance_score": 20.0, "matched_keywords": ["Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Gold’s role amid US-China trade developments: A strategic perspective", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/golds-role-amid-us-china-trade-developments-strategic-perspective", "pubDate": "Mon, 17 Nov 2025 10:30:00 GMT", "description": "Recently, I joined Asharq Business on Bloomberg TV to discuss the latest developments in the anticipated US-China trade agreement and its impact on gold within the financial landscape.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Unearthed: India’s Golden Transformation", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/unearthed-indias-golden-transformation", "pubDate": "Fri, 14 Nov 2025 09:00:00 GMT", "description": "In this episode of Unearthed, hosts Joe Cavatoni and John Reade, Senior Market Strategists at the World Gold Council, are joined by Sachin Jain, CEO of the World Gold Council India, to explore the pivotal role of India in the global gold market.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: Open the spigots", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/weekly-markets-monitor-open-spigots", "pubDate": "Mon, 10 Nov 2025 12:00:00 GMT", "description": "Last week’s economic updates highlighted uneven global momentum. US consumer sentiment dipped close to record lows, and European central banks kept rates steady. China’s exports fell and Japan’s manufacturing slowed, whereas India’s manufacturing gained pace.", "relevance_score": 30.0, "matched_keywords": ["Weekly Markets Monitor", "Central Bank"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "You asked, we answered: What are the implications of the VAT reform in China?", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/you-asked-we-answered-what-are-implications-vat-reform-china", "pubDate": "Fri, 07 Nov 2025 13:30:00 GMT", "description": "China recently announced changes to the gold market value-added tax policies, effective from 1 November 2025 to 31 December 2027. Members who buy and sell gold directly on the SGE remain VAT free; meanwhile, members withdrawing physical gold and re-selling with investment purposes are not impacted, while those with non-investment purposes now face higher costs when they re-distribute. With higher costs, gold jewellery demand in China may face some headwinds, but it may can also be an additional catalyst for innovation amidst a competitive landscape. Investment demand is not directly impacted by the policy, but we may see greater concentration of gold buying through SGE members.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Flows rise from Wall Street to the Bund", "link": "https://www.gold.org/goldhub/research/gold-etfs-holdings-and-flows/2025/11", "pubDate": "Thu, 06 Nov 2025 12:00:00 UTC", "description": "Global physically backed gold ETFs added US$8.2bn in October, the fifth consecutive monthly inflow. North America (+US$6.5bn) and Asia (US$+6.1bn) led global inflows, while European funds lost US$4.5bn, the only region with outflows in the month. Continued inflows and gold price strength lifted global gold ETFs’ total AUM 6% higher m/m to US$503bn, another month-end peak, and holdings climbed 1% m/m to 3,893t, 1% away from the record level of 3,929t.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Gold Market Commentary: Technical difficulties", "link": "https://www.gold.org/goldhub/research/gold-market-commentary-october-2025", "pubDate": "Thu, 06 Nov 2025 12:00:00 UTC", "description": "A momentum flush out and stronger dollar contributed to a see-saw for gold from its 50th all-time high. But gold still managed good gains in October.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "US Gold Demand Trends Q3 2025", "link": "https://www.gold.org/goldhub/research/gold-demand-trends/us-gold-demand-trends-q3-2025", "pubDate": "Wed, 05 Nov 2025 12:00:00 UTC", "description": "Overall gold demand in the US rebounded in the third quarter, in which demand of 186t grew 58% y/y. NA ETF inflows reached $16bn (137t) in Q3 and cumulative net inflows his US$37bn through September. Average daily trading volumes of US listed products grew 37% y/y in the quarter, and carried this momentum into October increasing 51% m/m to a new record of US$208bn (1,587t) per day.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Central bank gold statistics: September 2025", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/central-bank-gold-statistics-september-2025", "pubDate": "Tue, 04 Nov 2025 09:00:00 GMT", "description": "Central banks reported 39t of net purchases in September via the IMF and other public data sources. This buying was up 78% m/m and is the highest month of reported net buying in 2025 so far. Y-t-d, central banks have reported 200t of net gold buying.*", "relevance_score": 30.0, "matched_keywords": ["Gold", "Central Bank"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: Deadlock and democrats", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/weekly-markets-monitor-deadlock-and-democrats", "pubDate": "Mon, 03 Nov 2025 11:30:00 GMT", "description": "Last week saw a thaw in US-China relations with a temporary trade agreement, alongside  divergent central bank actions. While the Fed and Bank of Canada lowered rates, the ECB and BoJ held steady.", "relevance_score": 30.0, "matched_keywords": ["Weekly Markets Monitor", "Central Bank"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Gold Demand Trends: Q3 2025", "link": "https://www.gold.org/goldhub/research/gold-demand-trends/gold-demand-trends-q3-2025", "pubDate": "Thu, 30 Oct 2025 12:00:00 UTC", "description": "Quarterly gold demand rose to a record in tandem with the price.  Growth was primarily from accelerating investment demand, which accelerated on a powerful combination of safe haven buying in an uncertain geopolitical environment, US dollar weakness and investor “FOMO” as the price continued to climb.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "ゴールド・デマンド・トレンド: 2025年第3四半期", "link": "https://www.gold.org/ja/goldhub/research/gold-demand-trends/gold-demand-trends-q3-2025", "pubDate": "Thu, 30 Oct 2025 12:00:00 UTC", "description": "Quarterly gold demand rose to a record in tandem with the price.  Growth was primarily from accelerating investment demand, which accelerated on a powerful combination of safe haven buying in an uncertain geopolitical environment, US dollar weakness and investor “FOMO” as the price continued to climb.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "ゴールド・デマンド・トレンド: 2025年第3四半期", "link": "https://www.gold.org/ja/goldhub/research/gold-demand-trends/gold-demand-trends-q3-2025", "pubDate": "Thu, 30 Oct 2025 12:00:00 UTC", "description": "Quarterly gold demand rose to a record in tandem with the price.  Growth was primarily from accelerating investment demand, which accelerated on a powerful combination of safe haven buying in an uncertain geopolitical environment, US dollar weakness and investor “FOMO” as the price continued to climb.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Gold Demand Trends: Q3 2025", "link": "https://www.gold.org/goldhub/research/gold-demand-trends/gold-demand-trends-q3-2025", "pubDate": "Thu, 30 Oct 2025 12:00:00 UTC", "description": "Quarterly gold demand rose to a record in tandem with the price.  Growth was primarily from accelerating investment demand, which accelerated on a powerful combination of safe haven buying in an uncertain geopolitical environment, US dollar weakness and investor “FOMO” as the price continued to climb.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: The Easing Glow", "link": "https://www.gold.org/goldhub/gold-focus/2025/10/weekly-markets-monitor-easing-glow", "pubDate": "Mon, 27 Oct 2025 11:15:00 GMT", "description": "Last week, global economic updates reflected both momentum and headwinds. US inflation eased and business activity strengthened, Eurozone and India saw manufacturing gains, while China and Japan reported uneven growth.", "relevance_score": 20.0, "matched_keywords": ["Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Portfolio resiliency: Gold’s role amid economic crosscurrents", "link": "https://www.gold.org/goldhub/gold-focus/2025/10/portfolio-resiliency-golds-role-amid-economic-crosscurrents", "pubDate": "Wed, 22 Oct 2025 13:00:00 BST", "description": "Uncertainties and vulnerabilities remain across geopolitical, fiscal, and trade domains. Importantly, the core reasons for considering alternative assets such as gold, as outline in our May report, remain largely unchanged.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: Gravity dismissed", "link": "https://www.gold.org/goldhub/gold-focus/2025/10/weekly-markets-monitor-gravity-dismissed", "pubDate": "Mon, 20 Oct 2025 11:00:00 BST", "description": "Last week presented a mixed global macro picture. US-China trade tensions eased. The US government shutdown continued.", "relevance_score": 20.0, "matched_keywords": ["Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "India gold market update: Festive shine", "link": "https://www.gold.org/goldhub/gold-focus/2025/10/india-gold-market-update-festive-shine", "pubDate": "Fri, 17 Oct 2025 10:00:00 BST", "description": "Gold continues its extraordinary price rally, having reached 48 all-time highs this year. Geopolitical tensions, strong investment demand, dollar weakness, financial market risk and expectations of dovish Fed policy lifted international prices by 11.6% in September and by an additional 7.9% in the first two weeks of October, pushing past the US$4,000/oz milestone.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "China gold market update: Wholesale demand rebounded", "link": "https://www.gold.org/goldhub/gold-focus/2025/10/china-gold-market-update-wholesale-demand-rebounded", "pubDate": "Fri, 17 Oct 2025 09:00:00 BST", "description": "Supported by reviving investment strength and relatively more active retailer replenishment, wholesale gold demand in China rebounded during September. Meanwhile, the PBoC announced its 11th consecutive monthly gold purchase and Chinese gold ETF flows turned positive.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "2025 Chinese jewellery retailer insights: Gold and self-wear remain key", "link": "https://www.gold.org/goldhub/research/2025-chinese-jewellery-retailer-insights-gold-and-self-wear-remain-key", "pubDate": "Wed, 15 Oct 2025 12:00:00 UTC", "description": "To explore current trends and future opportunities we conducted our 2025 annual Chinese jewellery retailer research in partnership with China Gold News for the sixth consecutive year. Through the lens of the retailer we found that gold products continue to dominate Chinese jewellery retailer sales while Heritage and Hard Pure gold jewellery products remain key sources of retailers’ profit. Buying for self-indulgent wear remains key in retailer jewellery sales. Retailer optimism around gold product sales is intact and self-indulgent buying may continue to drive business in the future.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Unearthed: The Gold Surge - What Investors Need to Know", "link": "https://www.gold.org/goldhub/gold-focus/2025/10/unearthed-gold-surge-what-investors-need-know", "pubDate": "Tue, 14 Oct 2025 10:45:00 BST", "description": "In this episode of Unearthed, hosts John Reade and Joseph Cavatoni, Senior Market Strategists at the World Gold Council, discuss the current state of the gold market.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: Calm interrupted", "link": "https://www.gold.org/goldhub/gold-focus/2025/10/weekly-markets-monitor-calm-interrupted", "pubDate": "Mon, 13 Oct 2025 13:35:00 BST", "description": "Last week was a rollercoaster of highs and lows. Israel and Hamas agreed a peace plan, while US-China trade tensions re-escalated.", "relevance_score": 20.0, "matched_keywords": ["Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Gold hits US$4,000/oz - trend or turning point?", "link": "https://www.gold.org/goldhub/gold-focus/2025/10/gold-hits-us4000oz-trend-or-turning-point", "pubDate": "Mon, 13 Oct 2025 13:30:00 BST", "description": "Gold reached another historic milestone on 8 October 2025 as it broke through US$4,000/oz. And while it finished the week below the record high, it’s en route to mark its strongest performance in a calendar year since 1979.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "West won’t rest – Q3 breaks records", "link": "https://www.gold.org/goldhub/research/gold-etfs-holdings-and-flows/2025/10", "pubDate": "Tue, 07 Oct 2025 12:00:00 UTC", "description": "Global physically backed gold ETFs recorded their largest monthly inflow in September (US$17bn), resulting in the strongest quarter on record of US$26bn. North American (US$10.6bn) and European funds (US$4.4bn) drove the bulk of inflows. Followed by Asia (US$2.1bn) and other regions (US$175mn). Supported by a rallying gold price, global gold ETFs’ total AUM rose 23% q/q to US$472bn, reaching another record, and holdings rose 6% q/q to 3,838t.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Gold Market Commentary: Stick, twist or double down?", "link": "https://www.gold.org/goldhub/research/gold-market-commentary-september-2025", "pubDate": "Tue, 07 Oct 2025 12:00:00 UTC", "description": "Record monthly ETF inflows took gold to its 39th new high for the year, finishing the month at US$3,825/oz (+12%). Y-t-d gold is up 47%, marking the highest return in a calendar year since 1979. Political tension, strong options market activity, and currency weakness played a key role in gold’s performance last month. Looking forward, there are plenty of reasons for investors to look at gold and the price could see further uplift should equities experience a correction. Perhaps only a major liquidity squeeze could upend both gold and equities, but there are no clear signs of fractures in cred ": "Bank for International Settlements", "source_type": "official", "title": "OTC derivatives statistics at end-June 2025", "link": "https://www.bis.org/publ/otc_hy2512.htm", "pubDate": "2025-12-08T12:00:00Z", "description": "The notional value of outstanding over-the-counter (OTC) derivatives rose to $846 trillion at June 2025, up 16% from June 2024.", "relevance_score": 10.0, "matched_keywords": ["Statistics"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "BIS residential property price statistics, Q2 2025", "link": "https://www.bis.org/statistics/pp_residential_2511.htm", "pubDate": "2025-11-27T14:04:00Z", "description": "Global house prices declined in real terms by 0.8% year on year (yoy) in Q2 2025, slightly less compared with the previous quarter (&#8211;1.0%).\r\nIn advanced economies (AEs), real house prices continued to increase, albeit at a slower pace (0.6%), while the price decline in emerging market economies (EMEs) moderated (to &#8211;1.9%).\r\nOver 70% of AEs and 50% of EMEs experienced moderate residential property price growth (0&#8211;10%) in Q2 2025.\r\nFrom a longer-term perspective, real house prices have more than doubled in Türkiye since the Great Financial Crisis (GFC) of 2007&#8211;09, while they remain below their 2010 levels in Italy, South Africa and China.", "relevance_score": 10.0, "matched_keywords": ["Statistics"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "BIS global liquidity indicators at end-June 2025", "link": "https://www.bis.org/statistics/gli2510.htm", "pubDate": "2025-10-30T14:44:00Z", "description": "", "relevance_score": 0.0, "matched_keywords": []}, {"source": "Bank for International Settlements", "source_type": "official", "title": "Statistical release: BIS international banking statistics and global liquidity indicators at end-June 2025", "link": "https://www.bis.org/statistics/rppb2510.htm", "pubDate": "2025-10-30T10:22:00Z", "description": "", "relevance_score": 18.0, "matched_keywords": ["Statistics", "Banking"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "OTC interest rate derivatives turnover in April 2025", "link": "https://www.bis.org/statistics/rpfx25_ir.htm", "pubDate": "2025-09-30T09:45:00Z", "description": "This statistical release concerns the IRD turnover part of the 2025 Triennial Survey that took place in April and involved central banks and other authorities in 52 jurisdictions.", "relevance_score": 15.0, "matched_keywords": ["Central Bank"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "OTC foreign exchange turnover in April 2025", "link": "https://www.bis.org/statistics/rpfx25_fx.htm", "pubDate": "2025-09-30T09:44:00Z", "description": "This statistical release concerns the FX turnover part of the 2025 Triennial Survey that took place in April and involved central banks and other authorities in 52 jurisdictions.", "relevance_score": 15.0, "matched_keywords": ["Central Bank"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "Triennial Central Bank Survey of foreign exchange and Over-the-counter (OTC) derivatives markets in 2025", "link": "https://www.bis.org/statistics/rpfx25.htm", "pubDate": "2025-09-30T09:21:00Z", "description": "On 1 April 2025, the BIS launched its 14th Triennial Central Bank Survey of foreign exchange and Over-the-counter derivatives markets. Preliminary results have been released on 30 September 2025.", "relevance_score": 15.0, "matched_keywords": ["Central Bank"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "BIS residential property price statistics, Q1 2025", "link": "https://www.bis.org/statistics/pp_residential_2508.htm", "pubDate": "2025-08-28T09:13:00Z", "description": "In the first quarter of 2025, global real house prices fell by 1.0% year on year (yoy), representing a slower pace of decline compared with the second half of 2024 (&#8211;1.6%).\r\nPrices in advanced economies (AEs) continued to recover, rising by 1.2% yoy in real terms. Meanwhile, emerging market economies (EMEs) experienced a slower decrease (&#8211;2.6%, relative to &#8211;3.5% in previous quarter), mainly driven by a continued fall in Asia.\r\nPrice developments showed greater variability across jurisdictions. Sharp yoy declines in Hong Kong SAR (&#8211;8%), China (&#8211;7%) and Türkiye (&#8211;6%) contrasted with significant increases in some European countries, namely North Macedonia (+18%), Portugal (+14%) and Bulgaria (+11%).\r\nSince the Great Financial Crisis (GFC) of 2007&#8211;09, global real house prices have risen by 21% (34% in AEs and 11% in EMEs).", "relevance_score": 10.0, "matched_keywords": ["Statistics"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "BIS global liquidity indicators at end-March 2025", "link": "https://www.bis.org/statistics/gli2507.htm", "pubDate": "2025-07-31T09:06:00Z", "description": "", "relevance_score": 0.0, "matched_keywords": []}, {"source": "Bank for International Settlements", "source_type": "official", "title": "Statistical release: BIS international banking statistics and global liquidity indicators at end-March 2025", "link": "https://www.bis.org/statistics/rppb2507.htm", "pubDate": "2025-07-31T08:49:00Z", "description": "Global cross-border bank credit expanded by $1.5 trillion in the first quarter of 2025, reaching a record $34.7 trillion.\r\nThe increase was driven by lending to non-bank financial institutions (NBFIs), whose annual growth rate rose to 14%.\r\nCross-border bank credit to emerging market and developing economies (EMDEs) expanded by $100 billion.\r\nThe BIS global liquidity indicators show that foreign currency credit in dollar, euro and yen grew respectively by 5%, 10% and 6% year-on-year at the end of the first quarter of 2025.", "relevance_score": 18.0, "matched_keywords": ["Statistics", "Banking"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "BIS residential property price statistics, Q4 2024", "link": "https://www.bis.org/statistics/pp_residential_2505.htm", "pubDate": "2025-05-28T14:12:00Z", "description": "Global house prices continued declining by 1.6% year on year in real terms during the fourth quarter of 2024.", "relevance_score": 10.0, "matched_keywords": ["Statistics"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "BIS global liquidity indicators at end-December 2024", "link": "https://www.bis.org/statistics/gli2504.htm", "pubDate": "2025-04-30T12:07:00Z", "description": "The BIS global liquidity indicators reveal that the share of Africa and the Middle East in dollar and euro credit to EMDEs has risen considerably over the past decade.", "relevance_score": 0.0, "matched_keywords": []}, {"source": "Bank for International Settlements", "source_type": "official", "title": "Statistical release: BIS international banking statistics and global liquidity indicators at end-December 2024", "link": "https://www.bis.org/statistics/rppb2504.htm", "pubDate": "2025-04-30T07:59:00Z", "description": "Global cross-border bank credit remained virtually unchanged in the fourth quarter of 2024, ending the year with an outstanding stock of $32.6 trillion.\r\nCross-border loans to non-bank financial institutions declined by $248 billion in Q4 2024. This brought down their annual growth rate to 12%.\r\nCross-border bank credit to emerging market and developing economies (EMDEs) increased by $67 billion, or 3.8% year on year, mainly owing to a $47 billion expansion in cross-border bank lending to emerging Asia-Pacific.\r\nThe BIS global liquidity indicators reveal that the share of Africa and the Middle East in dollar and euro credit to EMDEs has risen considerably over the past decade.", "relevance_score": 18.0, "matched_keywords": ["Statistics", "Banking"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "2025 Triennial Central Bank Survey of Foreign Exchange and OTC Derivatives Markets", "link": "https://www.bis.org/statistics/rpfx25_announcement.htm", "pubDate": "2025-03-31T14:58:00Z", "description": "On 1 April 2025, the BIS will launch its 14th Triennial Central Bank Survey of Foreign Exchange and Over-the-counter Derivatives Markets.\r\nMore than 1,100 financial institutions in 52 jurisdictions will contribute data.\r\nPreliminary results will be published in September and final results will be published in December 2025.", "relevance_score": 15.0, "matched_keywords": ["Central Bank"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "And so we pay: more digital and faster, with cash still in play", "link": "https://www.bis.org/statistics/payment_stats/commentary2503.htm", "pubDate": "2025-03-25T15:17:00Z", "description": "The use of cashless payments continues to increase. In particular, the use of credit transfers and e-money has grown, especially in emerging market and developing economies (EMDEs).\r\nFast payments are gaining further ground and a key driver of the growing use of credit transfers in many EMDEs. Fast payments are often associated with less cash in circulation, and with more and smaller card payments.\r\nThe ongoing digitalisation of payments coincides with a further decline in cash in circulation. Even so, the demand for cash withdrawals has generally stabilised, which highlights the lasting role of cash.", "relevance_score": 0.0, "matched_keywords": []}, {"source": "Bank for International Settlements", "source_type": "official", "title": "BIS residential property price statistics, Q3 2024", "link": "https://www.bis.org/statistics/pp_residential_2502.htm", "pubDate": "2025-02-27T09:00:00Z", "description": "Global house prices declined by 1.6% year on year in real terms during the third quarter of 2024. This drop, despite the rise observed in the majority of the jurisdictions covered by BIS statistics, reflected the substantial fall recorded by a few large emerging market economies...", "relevance_score": 10.0, "matched_keywords": ["Statistics"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "BIS global liquidity indicators at end-September 2024", "link": "https://www.bis.org/statistics/gli2501.htm", "pubDate": "2025-01-30T09:00:00Z", "description": "The BIS global liquidity indicators reveal that the ongoing weakness in dollar and euro credit to emerging Asia dates back to the respective starting points of the post-Covid Federal Reserve and ECB tightening cycles.", "relevance_score": 0.0, "matched_keywords": []}, {"source": "Bank for International Settlements", "source_type": "official", "title": "Statistical release: BIS international banking statistics and global liquidity indicators at end-September 2024", "link": "https://www.bis.org/statistics/rppb2501.htm", "pubDate": "2025-01-30T09:00:00Z", "description": "During the third quarter of 2024, banks' cross-border claims expanded by $629 billion, up 3.4% year on year.\r\nThe expansion in claims was primarily driven by cross-border bank credit (ie loans and holdings of debt securities) to non-bank financial institutions (NBFIs) in advanced economies.\r\nCross-border bank credit to emerging market and developing economies expanded, notwithstanding a contraction vis-à-vis China.\r\nThe BIS global liquidity indicators reveal that the ongoing weakness in dollar and euro credit to emerging Asia dates back to the respective starting points of the post-Covid Federal Reserve and ECB tightening cycles.", "relevance_score": 18.0, "matched_keywords": ["Statistics", "Banking"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "BIS residential property price statistics, Q2 2024", "link": "https://www.bis.org/statistics/pp_residential_2411.htm", "pubDate": "2024-11-28T13:49:00Z", "description": "Global house prices continued to decline in the second quarter of 2024, with a 1.4% year-on-year (yoy) decrease in aggregate and real terms, driven by sharp decreases in large emerging market economies (EMEs) in Asia.\r\nMedian house prices increased slightly, as more than 60% of jurisdictions globally saw an increase in real house prices.\r\nReal house prices increased moderately in advanced economies (AEs) for the first time since Q3 2022 (+0.2%), while they continued to decline (&#8211;2.6%) in EMEs.\r\nDifferences persist across major economies. In AEs, real house prices fell in Europe, while they increased in non-European countries. In EMEs, prices fell in Asia but rose in all other regions.\r\nFrom a longer-term perspective, real global house prices remain 21% above their average level observed in the aftermath of the 2007&#8211;09 Great Financial Crisis (GFC).", "relevance_score": 10.0, "matched_keywords": ["Statistics"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "OTC derivatives statistics at end-June 2024", "link": "https://www.bis.org/publ/otc_hy2411.htm", "pubDate": "2024-11-21T09:00:00Z", "description": "The value of outstanding derivatives (notional amounts) grew by 2% year on year (yoy) at end-June 2024. Amounts fell by 6% in the second half of 2023 and increased by 9% in the first half of 2024, in keeping with a seasonal saw-tooth pattern. The notional value of foreign exchange (FX) swaps and forwards rose in the first half of 2024. Contracts with the yen on one side saw particularly strong growth (13% yoy in dollar terms and 26% in yen terms). The notional value of interest rate derivatives remained flat, but their gross market value declined for a third consecutive reporting period, by 17% yoy. The value of \"Other commodities\" (notional amounts), which include oil derivatives, expanded in the first half of 2024, pushing yoy growth to 18%.", "relevance_score": 10.0, "matched_keywords": ["Statistics"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "Statistical release: BIS international banking statistics and global liquidity indicators at end-June 2024", "link": "https://www.bis.org/statistics/rppb2410.htm", "pubDate": "2024-10-31T09:00:00Z", "description": "Global cross-border bank claims changed little during the second quarter of 2024. Claims dropped by a modest $11 billion following a surge in the previous quarter.\r\nCross-border bank credit (ie loans and holdings of debt securities) rose by a mere $36 billion during Q2, leaving the year-on-year (yoy) growth rate at 6%. Credit to advanced economies (AEs) grew at 6% yoy, while that to emerging market and developing economies (EMDEs) accelerated to 3% yoy.\r\nDollar-denominated credit to EMDEs continued to contract. By contrast, credit denominated in the Chinese renminbi rose further, mainly to borrowers in the Asia-Pacific region.\r\nThe BIS global liquidity indicators (GLIs) show that dollar-denominated foreign currency credit to non-banks in EMDEs fell modestly during Q2 2024. Bank lending declined slightly while international bond issuance held up.", "relevance_score": 18.0, "matched_keywords": ["Statistics", "Banking"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "BIS global liquidity indicators at end-June 2024", "link": "https://www.bis.org/statistics/gli2410.htm", "pubDate": "2024-10-31T09:00:00Z", "description": "The BIS global liquidity indicators (GLIs) show that dollar-denominated foreign currency credit to non-banks in EMDEs fell modestly during Q2 2024. Bank lending declined slightly while international bond issuance held up.", "relevance_score": 0.0, "matched_keywords": []}, {"source": "Bank for International Settlements", "source_type": "official", "title": "BIS residential property price statistics, Q1 2024", "link": "https://www.bis.org/statistics/pp_residential_2408.htm", "pubDate": "2024-08-29T08:00:00Z", "description": "The fall in global house prices moderated further in the first quarter of 2024, at 1.0% year on year (yoy) in aggregate and in real terms. \r\nIn more than half of the economies, real prices were already increasing compared with the same period one year earlier, showing high heterogeneity. \r\nReal house prices have declined further in emerging market economies (EMEs) (&#8211;1.6% yoy), while having almost stabilised in advanced economies (AEs) (&#8211;0.3% yoy). \r\nConsiderable differences persist across major economies. For instance, real house prices surged in Australia, Mexico and also increased in the United States in Q1 2024. At the other end of the scale, prices fell sharply in China, Korea and even more so in Türkiye. \r\nIn real terms, global house prices remain significantly (23%) above their average level observed since the 2007&#8211;09 Great Financial Crisis (GFC) &#8211; by 32% in AEs and 15% in EMEs.", "relevance_score": 10.0, "matched_keywords": ["Statistics"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "Statistical release: BIS international banking statistics and global liquidity indicators at end-March 2024", "link": "https://www.bis.org/statistics/rppb2407.htm", "pubDate": "2024-07-31T08:00:00Z", "description": "Banks' global cross-border claims increased by $1.1 trillion during Q1 2024, driven by bank credit (ie loans and holdings of debt securities). Outstanding claims reached $39.6 trillion, up 5% year-on-year (yoy).\r\nBank credit to advanced economies (AEs) increased the most (+6% yoy), driven by credit to non-banks. Credit to emerging market and developing economies (EMDEs) grew by 2%, supported by strong lending in Chinese renminbi.\r\nThe BIS global liquidity indicators (GLIs) show that the growth in dollar-denominated foreign currency credit to non-banks in EMDEs turned positive (1%) for the first time in nearly two years. The role of bond financing in dollar and eu       } else {
        if (checkbox.checked) {
          checkboxes[0].checked = false; // Uncheck "all"
          selectedSourceTypes = selectedSourceTypes.filter(s => s !== 'all');
          selectedSourceTypes.push(value);
        } else {
          selectedSourceTypes = selectedSourceTypes.filter(s => s !== value);
          if (selectedSourceTypes.length === 0) {
            selectedSourceTypes = ['all'];
            checkboxes[0].checked = true;
          }
        }
      }
      
      updateSourceTypeLabel();
      applyFilters();
    }

    function updateSourceLabel() {
      const label = document.getElementById('sourceFilterLabel');
      if (selectedSources.includes('all') || selectedSources.length === 0) {
        label.textContent = 'All Sources';
      } else if (selectedSources.length === 1) {
        label.textContent = selectedSources[0];
      } else {
        label.textContent = `${selectedSources.length} sources selected`;
      }
    }

    function updateSourceTypeLabel() {
      const label = document.getElementById('sourceTypeFilterLabel');
      if (selectedSourceTypes.includes('all') || selectedSourceTypes.length === 0) {
        label.textContent = 'All Types';
      } else if (selectedSourceTypes.length === 1) {
        label.textContent = selectedSourceTypes[0].charAt(0).toUpperCase() + selectedSourceTypes[0].slice(1);
      } else {
        label.textContent = `${selectedSourceTypes.length} types selected`;
      }
    }

    function applyFilters() {
      const searchTerm = searchInput.value.toLowerCase();
      const sortBy = sortSelect.value;
      const sevenDaysAgo = new Date();
      sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

      // Filter
      filteredItems = allItems.filter(item => {
        const matchesSearch = 
          item.title.toLowerCase().includes(searchTerm) ||
          item.description.toLowerCase().includes(searchTerm) ||
          item.source.toLowerCase().includes(searchTerm);
        
        const matchesSource = selectedSources.includes('all') || 
                             selectedSources.includes(item.source);
        
        const matchesSourceType = selectedSourceTypes.includes('all') || 
                                 selectedSourceTypes.includes(item.source_type);
        
        const matchesDate = !last7DaysOnly || 
                           (item.pubDate && new Date(item.pubDate) >= sevenDaysAgo);

        return matchesSearch && matchesSource && matchesSourceType && matchesDate;
      });

      // Sort
      filteredItems.sort((a, b) => {
        if (sortBy === 'date-desc') {
          return new Date(b.pubDate || 0) - new Date(a.pubDate || 0);
        } else if (sortBy === 'date-asc') {
          return new Date(a.pubDate || 0) - new Date(b.pubDate || 0);
        } else if (sortBy === 'relevance-desc') {
          return (b.relevance_score || 0) - (a.relevance_score || 0);
        } else if (sortBy === 'title-asc') {
          return a.title.localeCompare(b.title);
        } else if (sortBy === 'title-desc') {
          return b.title.localeCompare(a.title);
        }
        return 0;
      });

      renderResults();
    }

    function getSourceTypeColor(sourceType) {
      const colors = {
        'official': 'bg-emerald-500/20 text-emerald-300',
        'research': 'bg-blue-500/20 text-blue-300',
        'news': 'bg-amber-500/20 text-amber-300'
      };
      return colors[sourceType] || colors['news'];
    }

    function renderResults() {
      resultsCount.textContent = `Showing ${filteredItems.length} of ${allItems.length} articles`;

      if (filteredItems.length === 0) {
        resultsContainer.innerHTML = `
          <div class="py-16 text-center">
            <p class="text-lg text-white/50">No articles found matching your criteria.</p>
          </div>
        `;
        return;
      }

      resultsContainer.innerHTML = filteredItems.map(item => `
        <div class="group rounded-2xl border border-white/10 bg-white/5 p-6 backdrop-blur-sm transition-all hover:border-indigo-400/50 hover:bg-white/10">
          <!-- Header row: Source, Type, Date, Score -->
          <div class="mb-3 flex flex-wrap items-center gap-2 text-xs">
            <span class="rounded-full bg-indigo-500/20 px-3 py-1 font-medium text-indigo-300">
              ${item.source}
            </span>
            <span class="rounded-full px-3 py-1 font-medium ${getSourceTypeColor(item.source_type)}">
              ${item.source_type}
            </span>
            <span class="text-white/40">
              ${formatDate(item.pubDate)}
            </span>
            <span class="ml-auto rounded-full bg-purple-500/20 px-3 py-1 font-medium text-purple-300">
              ⭐ ${item.relevance_score.toFixed(1)}
            </span>
          </div>

          <!-- Title -->
          <h3 class="mb-2 text-lg font-semibold leading-snug text-white">
            <a href="${item.link}" target="_blank" class="hover:text-indigo-300 transition-colors">
              ${item.title}
            </a>
          </h3>

          <!-- Keywords/Tags -->
          ${item.matched_keywords && item.matched_keywords.length > 0 ? `
            <div class="mb-3 flex flex-wrap gap-1">
              ${item.matched_keywords.map(keyword => `<span class="tag">${keyword}</span>`).join('')}
            </div>
          ` : ''}

          <!-- Description -->
          <p class="line-clamp-2 text-sm leading-relaxed text-white/60">
            ${item.description}
          </p>

          <!-- Read more link -->
          <a
            href="${item.link}"
            target="_blank"
            class="mt-3 inline-flex items-center gap-2 text-sm font-medium text-indigo-300 transition-all hover:gap-3 hover:text-indigo-200"
          >
            Read article
            <svg class="size-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M13 7l5 5m0 0l-5 5m5-5H6" />
            </svg>
          </a>
        </div>
      `).join('');
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'Date unknown';
      try {
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { 
          year: 'numeric', 
          month: 'short', 
          day: 'numeric' 
        });
      } catch {
        return dateStr;
      }
    }

    // Snapshot toggle function
    function toggleSnapshot() {
      const content = document.getElementById('snapshotContent');
      const chevron = document.getElementById('snapshotChevron');
      
      if (content.classList.contains('hidden')) {
        content.classList.remove('hidden');
        chevron.style.transform = 'rotate(180deg)';
      } else {
        content.classList.add('hidden');
        chevron.style.transform = 'rotate(0deg)';
      }
    }

    // Initial render
    applyFilters();
  </script>
</body>
</html>
