 Monitor: Venezuela’s ripple effect", "link": "https://www.gold.org/goldhub/gold-focus/2026/01/weekly-markets-monitor-venezuelas-ripple-effect", "pubDate": "Mon, 05 Jan 2026 11:25:00 GMT", "description": "Last week, US data showed strong jobs and housing trends amid a widening FOMC policy divide. In the Eurozone, inflation eased while manufacturing contracted. In Asia, China’s factory activity rebounded, yet India’s PMI hit a two-year low.", "relevance_score": 20.0, "matched_keywords": ["Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: A season for Kevin?", "link": "https://www.gold.org/goldhub/gold-focus/2025/12/weekly-markets-monitor-season-kevin", "pubDate": "Mon, 22 Dec 2025 10:00:00 GMT", "description": "Last week saw diverging data and policy action: the ECB and Nordic banks held rates, the BoE cut, and the BoJ hiked. In the US, jobs rebounded and inflation eased, but consumer spending and housing remained tight, while China’s economic momentum slowed.", "relevance_score": 20.0, "matched_keywords": ["Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "You asked, we answered: Is gold’s appeal fading on rising vol?", "link": "https://www.gold.org/goldhub/gold-focus/2025/12/you-asked-we-answered-golds-appeal-fading-rising-vol", "pubDate": "Fri, 19 Dec 2025 12:00:00 GMT", "description": "While gold’s volatility rose in 2025, it did so from a low base and in line with other assets; gold’s vol seems to have normalized, remaining broadly in line with long-term averages.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Unearthed: Gold's Breakout Year & Outlook for 2026", "link": "https://www.gold.org/goldhub/gold-focus/2025/12/unearthed-golds-breakout-year-outlook-2026", "pubDate": "Thu, 18 Dec 2025 12:00:00 GMT", "description": "In this year-end episode of Unearthed, Joe Cavatoni and John Reade, Senior Market Strategists at the World Gold Council, recap an extraordinary 2025 for gold, marked by more than 50 all-time highs and ending the year comfortably above US$ 4,000/oz.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "India gold market update: Investment-led support", "link": "https://www.gold.org/goldhub/gold-focus/2025/12/india-gold-market-update-investment-led-support", "pubDate": "Wed, 17 Dec 2025 09:00:00 GMT", "description": "The inauspicious period from mid-December to mid-January is likely to weigh on jewellery demand, while investment interest is expected to be sustained.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: Top of the morning", "link": "https://www.gold.org/goldhub/gold-focus/2025/12/weekly-markets-monitor-top-morning", "pubDate": "Mon, 15 Dec 2025 10:25:00 GMT", "description": "Last week was a busy period for central banks: the Fed cut as expected while the Bank of Canada, Reserve Bank of Australia, and Swiss National Bank held rates steady.", "relevance_score": 30.0, "matched_keywords": ["Weekly Markets Monitor", "Central Bank"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "China gold market update: November demand feels the VAT reform", "link": "https://www.gold.org/goldhub/gold-focus/2025/12/china-gold-market-update-november-demand-feels-vat-reform", "pubDate": "Fri, 12 Dec 2025 14:00:00 GMT", "description": "The recent VAT reform weighed on China’s gold jewellery demand in November, denting gold withdrawals from the Shanghai Gold Exchange despite robust investment buying. Gold ETFs in China continued to attract notable inflows in the month and the PBoC reported gold purchases 13 months in a row.", "relevance_score": 20.0, "matched_keywor stment strength, wholesale gold demand in China rose m/m and y/y during October, defying the seasonal weakness. Local gold ETFs also saw notable inflows, generally tracking the gold price. Meanwhile, the PBoC reported its 12th consecutive monthly gold purchase. Looking ahead, the VAT reform in China’s gold market may insert profound impact on different sectors of local gold demand.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: Return of the Mac(ro)", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/weekly-markets-monitor-return-macro", "pubDate": "Mon, 17 Nov 2025 11:30:00 GMT", "description": "Last week marked the end of the longest US government shutdown, while economic updates from major economies painted a mixed picture. Meanwhile, expectations for further Fed rate cuts waned after hawkish comments from officials.", "relevance_score": 20.0, "matched_keywords": ["Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Gold’s role amid US-China trade developments: A strategic perspective", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/golds-role-amid-us-china-trade-developments-strategic-perspective", "pubDate": "Mon, 17 Nov 2025 10:30:00 GMT", "description": "Recently, I joined Asharq Business on Bloomberg TV to discuss the latest developments in the anticipated US-China trade agreement and its impact on gold within the financial landscape.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Unearthed: India’s Golden Transformation", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/unearthed-indias-golden-transformation", "pubDate": "Fri, 14 Nov 2025 09:00:00 GMT", "description": "In this episode of Unearthed, hosts Joe Cavatoni and John Reade, Senior Market Strategists at the World Gold Council, are joined by Sachin Jain, CEO of the World Gold Council India, to explore the pivotal role of India in the global gold market.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: Open the spigots", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/weekly-markets-monitor-open-spigots", "pubDate": "Mon, 10 Nov 2025 12:00:00 GMT", "description": "Last week’s economic updates highlighted uneven global momentum. US consumer sentiment dipped close to record lows, and European central banks kept rates steady. China’s exports fell and Japan’s manufacturing slowed, whereas India’s manufacturing gained pace.", "relevance_score": 30.0, "matched_keywords": ["Weekly Markets Monitor", "Central Bank"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "You asked, we answered: What are the implications of the VAT reform in China?", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/you-asked-we-answered-what-are-implications-vat-reform-china", "pubDate": "Fri, 07 Nov 2025 13:30:00 GMT", "description": "China recently announced changes to the gold market value-added tax policies, effective from 1 November 2025 to 31 December 2027. Members who buy and sell gold directly on the SGE remain VAT free; meanwhile, members withdrawing physical gold and re-selling with investment purposes are not impacted, while those with non-investment purposes now face higher costs when they re-distribute. With higher costs, gold jewellery demand in China may face some headwinds, but it may can also be an additional catalyst for innovation amidst a competitive landscape. Investment demand is not directly impacted by the policy, but we may see greater concentration of gold buying through SGE members.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Gold ics: September 2025", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/central-bank-gold-statistics-september-2025", "pubDate": "Tue, 04 Nov 2025 09:00:00 GMT", "description": "Central banks reported 39t of net purchases in September via the IMF and other public data sources. This buying was up 78% m/m and is the highest month of reported net buying in 2025 so far. Y-t-d, central banks have reported 200t of net gold buying.*", "relevance_score": 30.0, "matched_keywords": ["Gold", "Central Bank"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: Deadlock and democrats", "link": "https://www.gold.org/goldhub/gold-focus/2025/11/weekly-markets-monitor-deadlock-and-democrats", "pubDate": "Mon, 03 Nov 2025 11:30:00 GMT", "description": "Last week saw a thaw in US-China relations with a temporary trade agreement, alongside  divergent central bank actions. While the Fed and Bank of Canada lowered rates, the ECB and BoJ held steady.", "relevance_score": 30.0, "matched_keywords": ["Weekly Markets Monitor", "Central Bank"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "ゴールド・デマンド・トレンド: 2025年第3四半期", "link": "https://www.gold.org/ja/goldhub/research/gold-demand-trends/gold-demand-trends-q3-2025", "pubDate": "Thu, 30 Oct 2025 12:00:00 UTC", "description": "Quarterly gold demand rose to a record in tandem with the price.  Growth was primarily from accelerating investment demand, which accelerated on a powerful combination of safe haven buying in an uncertain geopolitical environment, US dollar weakness and investor “FOMO” as the price continued to climb.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Gold Demand Trends: Q3 2025", "link": "https://www.gold.org/goldhub/research/gold-demand-trends/gold-demand-trends-q3-2025", "pubDate": "Thu, 30 Oct 2025 12:00:00 UTC", "description": "Quarterly itor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "India gold market update: Festive shine", "link": "https://www.gold.org/goldhub/gold-focus/2025/10/india-gold-market-update-festive-shine", "pubDate": "Fri, 17 Oct 2025 10:00:00 BST", "description": "Gold continues its extraordinary price rally, having reached 48 all-time highs this year. Geopolitical tensions, strong investment demand, dollar weakness, financial market risk and expectations of dovish Fed policy lifted international prices by 11.6% in September and by an additional 7.9% in the first two weeks of October, pushing past the US$4,000/oz milestone.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "China gold market update: Wholesale demand rebounded", "link": "https://www.gold.org/goldhub/gold-focus/2025/10/china-gold-market-update-wholesale-demand-rebounded", "pubDate": "Fri, 17 Oct 2025 09:00:00 BST", "description": "Supported by reviving investment strength and relatively more active retailer replenishment, wholesale gold demand in China rebounded during September. Meanwhile, the PBoC announced its 11th consecutive monthly gold purchase and Chinese gold ETF flows turned positive.", "relevance_score": 20.0, "matched_keywords": ["Gold"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "2025 Chinese jewellery retailer insights: Gold and self-wear remain key", "link": "https://www.gold.org/goldhub/research/2025-chinese-jewellery-retailer-insights-gold-and-self-wear-remain-key", "pubDate": "Wed, 15 Oct 2025 12:00:00 UTC", "description": "To explore current trends and future opportunities we conducted our 2025 annual Chinese jewellery retailer research in partnership with China Gold News for the sixth consecutive year. Through the lens of the retailer we found that gold products continue to dominate Chinese jewellery retailer sales while Heritage an s at loggerheads over whether the economy is reflating or stagflating.", "relevance_score": 20.0, "matched_keywords": ["Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Central bank gold statistics: Central bank gold buying rebounds in August", "link": "https://www.gold.org/goldhub/gold-focus/2025/10/central-bank-gold-statistics-central-bank-gold-buying-rebounds-august", "pubDate": "Fri, 03 Oct 2025 09:00:00 BST", "description": "Central banks added a net 19t to global gold reserves in August, based on reported data from both the IMF and respective central banks. This is broadly in line with monthly net purchases between March and June, and signals a return to buying form after global reserves were unchanged in July.", "relevance_score": 30.0, "matched_keywords": ["Gold", "Central Bank"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "Weekly Markets Monitor: Grinding higher", "link": "https://www.gold.org/goldhub/gold-focus/2025/09/weekly-markets-monitor-grinding-higher", "pubDate": "Mon, 29 Sep 2025 12:00:00 BST", "description": "Last week saw a mixed bag of PMI data: US, UK and India all softer but all remain in expansion territory.", "relevance_score": 20.0, "matched_keywords": ["Weekly Markets Monitor"]}, {"source": "World Gold Council - Research", "source_type": "official", "title": "2025 Japanese gold investor insights: The golden opportunity", "link": "https://www.gold.org/goldhub/research/2025-japanese-gold-investor-insights-golden-opportunity", "pubDate": "Thu, 25 Sep 2025 12:00:00 UTC", "description": "In this investor research report, we explore Japanese investors’ attitudes to gold, such as gold’s shares in their portfolios, barriers to their gold allocation decisions and the potential for gold investment in the future. By assessing the current macro backdrop in Japan and studying local investors’ top needs, we believe gold has the potential to become a more rel 3 2025 increase in cross-border bank credit was led by lending to borrowers in the United States ($284 billion); non-bank financial institutions (NBFIs) were a prominent counterparty globally, especially those in the United States ($157 billion).\r\nCross-border bank credit to emerging Asia declined by 6% year on year, while that to emerging Europe, Africa and the Middle East, and Latin America grew by 24%, 17% and 6%, respectively.\r\nThe BIS global liquidity indicators show that foreign currency credit in dollars grew by 7% year on year at end-Q3 2025 on the back of a weakening dollar. Foreign currency credit in euros grew 11% while that in yen contracted by 4%.", "relevance_score": 18.0, "matched_keywords": ["Statistics", "Banking"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "OTC derivatives statistics at end-June 2025", "link": "https://www.bis.org/publ/otc_hy2512.htm", "pubDate": "2025-12-08T12:00:00Z", "description": "The notional value of outstanding over-the-counter (OTC) derivatives rose to $846 trillion at June 2025, up 16% from June 2024.", "relevance_score": 10.0, "matched_keywords": ["Statistics"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "BIS residential property price statistics, Q2 2025", "link": "https://www.bis.org/statistics/pp_residential_2511.htm", "pubDate": "2025-11-27T14:04:00Z", "description": "Global house prices declined in real terms by 0.8% year on year (yoy) in Q2 2025, slightly less compared with the previous quarter (&#8211;1.0%).\r\nIn advanced economies (AEs), real house prices continued to increase, albeit at a slower pace (0.6%), while the price decline in emerging market economies (EMEs) moderated (to &#8211;1.9%).\r\nOver 70% of AEs and 50% of EMEs experienced moderate residential property price growth (0&#8211;10%) in Q2 2025.\r\nFrom a longer-term perspective, real house prices have more than doubled in Türkiye since the Great Financial Cr y EMDEs. Fast payments are often associated with less cash in circulation, and with more and smaller card payments.\r\nThe ongoing digitalisation of payments coincides with a further decline in cash in circulation. Even so, the demand for cash withdrawals has generally stabilised, which highlights the lasting role of cash.", "relevance_score": 0.0, "matched_keywords": []}, {"source": "Bank for International Settlements", "source_type": "official", "title": "BIS residential property price statistics, Q3 2024", "link": "https://www.bis.org/statistics/pp_residential_2502.htm", "pubDate": "2025-02-27T09:00:00Z", "description": "Global house prices declined by 1.6% year on year in real terms during the third quarter of 2024. This drop, despite the rise observed in the majority of the jurisdictions covered by BIS statistics, reflected the substantial fall recorded by a few large emerging market economies...", "relevance_score": 10.0, "matched_keywords": ["Statistics"]}, {"source": "Bank for International Settlements", "source_type": "official", "title": "BIS global liquidity indicators at end-September 2024", "link": "https://www.bis.org/statistics/gli2501.htm", "pubDate": "2025-01-30T09:00:00Z", "description": "The BIS global liquidity indicators reveal that the ongoing weakness in dollar and euro credit to emerging Asia dates back to the respective starting points of the post-Covid Federal Reserve and ECB tightening cycles.", "relevance_score": 0.0, "matched_keywords": []}, {"source": "Bank for International Settlements", "source_type": "official", "title": "Statistical release: BIS international banking statistics and global liquidity indicators at end-September 2024", "link": "https://www.bis.org/statistics/rppb2501.htm", "pubDate": "2025-01-30T09:00:00Z", "description": "During the third quarter of 2024, banks' cross-border claims expanded by $629 billion, up 3.4% year on year.\r\nThe expansion in claims was primarily driven by cross-border bank credit (ie loans and       const btn = dateFilterBtn;
      if (last7DaysOnly) {
        btn.classList.add('border-indigo-400/50', 'bg-indigo-500/20');
        btn.classList.remove('border-white/10', 'bg-white/5');
        btn.textContent = '📅 Last 7 Days';
      } else {
        btn.classList.remove('border-indigo-400/50', 'bg-indigo-500/20');
        btn.classList.add('border-white/10', 'bg-white/5');
        btn.textContent = '📅 All Dates';
      }
      applyFilters();
    }

    function handleSourceFilter(checkbox) {
      const value = checkbox.value;
      const dropdown = document.getElementById('sourceDropdown');
      const checkboxes = dropdown.querySelectorAll('input[type="checkbox"]');
      
      if (value === 'all') {
        if (checkbox.checked) {
          selectedSources = ['all'];
          checkboxes.forEach(cb => {
            if (cb.value !== 'all') cb.checked = false;
          });
        } else {
          checkbox.checked = true; // Keep "all" checked
        }
      } else {
        if (checkbox.checked) {
          checkboxes[0].checked = false; // Uncheck "all"
          selectedSources = selectedSources.filter(s => s !== 'all');
          selectedSources.push(value);
        } else {
          selectedSources = selectedSources.filter(s => s !== value);
          if (selectedSources.length === 0) {
            selectedSources = ['all'];
            checkboxes[0].checked = true;
          }
        }
      }
      
      updateSourceLabel();
      applyFilters();
    }

    function handleSourceTypeFilter(checkbox) {
      const value = checkbox.value;
      const dropdown = document.getElementById('sourceTypeDropdown');
      const checkboxes = dropdown.querySelectorAll('input[type="checkbox"]');
      
      if (value === 'all') {
        if (checkbox.checked) {
          selectedSourceTypes = ['all'];
          checkboxes.forEach(cb => {
            if (cb.value !== 'all') cb.checked = false;
          });
        } else {
          checkbox.checked = true; // Keep "all" checked
        }
      } else {
        if (checkbox.checked) {
          checkboxes[0].checked = false; // Uncheck "all"
          selectedSourceTypes = selectedSourceTypes.filter(s => s !== 'all');
          selectedSourceTypes.push(value);
        } else {
          selectedSourceTypes = selectedSourceTypes.filter(s => s !== value);
          if (selectedSourceTypes.length === 0) {
            selectedSourceTypes = ['all'];
            checkboxes[0].checked = true;
          }
        }
      }
      
      updateSourceTypeLabel();
      applyFilters();
    }

    function updateSourceLabel() {
      const label = document.getElementById('sourceFilterLabel');
      if (selectedSources.includes('all') || selectedSources.length === 0) {
        label.textContent = 'All Sources';
      } else if (selectedSources.length === 1) {
        label.textContent = selectedSources[0];
      } else {
        label.textContent = `${selectedSources.length} sources selected`;
      }
    }

    function updateSourceTypeLabel() {
      const label = document.getElementById('sourceTypeFilterLabel');
      if (selectedSourceTypes.includes('all') || selectedSourceTypes.length === 0) {
        label.textContent = 'All Types';
      } else if (selectedSourceTypes.length === 1) {
        label.textContent = selectedSourceTypes[0].charAt(0).toUpperCase() + selectedSourceTypes[0].slice(1);
      } else {
        label.textContent = `${selectedSourceTypes.length} types selected`;
      }
    }

    function applyFilters() {
      const searchTerm = searchInput.value.toLowerCase();
      const sortBy = sortSelect.value;
      const sevenDaysAgo = new Date();
      sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

      // Filter
      filteredItems = allItems.filter(item => {
        const matchesSearch = 
          item.title.toLowerCase().includes(searchTerm) ||
          item.description.toLowerCase().includes(searchTerm) ||
          item.source.toLowerCase().includes(searchTerm);
        
        const matchesSource = selectedSources.includes('all') || 
                             selectedSources.includes(item.source);
        
        const matchesSourceType = selectedSourceTypes.includes('all') || 
                                 selectedSourceTypes.includes(item.source_type);
        
        const matchesDate = !last7DaysOnly || 
                           (item.pubDate && new Date(item.pubDate) >= sevenDaysAgo);

        return matchesSearch && matchesSource && matchesSourceType && matchesDate;
      });

      // Sort
      filteredItems.sort((a, b) => {
        if (sortBy === 'date-desc') {
          return new Date(b.pubDate || 0) - new Date(a.pubDate || 0);
        } else if (sortBy === 'date-asc') {
          return new Date(a.pubDate || 0) - new Date(b.pubDate || 0);
        } else if (sortBy === 'relevance-desc') {
          return (b.relevance_score || 0) - (a.relevance_score || 0);
        } else if (sortBy === 'title-asc') {
          return a.title.localeCompare(b.title);
        } else if (sortBy === 'title-desc') {
          return b.title.localeCompare(a.title);
        }
        return 0;
      });

      renderResults();
    }

    function getSourceTypeColor(sourceType) {
      const colors = {
        'official': 'bg-emerald-500/20 text-emerald-300',
        'research': 'bg-blue-500/20 text-blue-300',
        'news': 'bg-amber-500/20 text-amber-300'
      };
      return colors[sourceType] || colors['news'];
    }

    function renderResults() {
      resultsCount.textContent = `Showing ${filteredItems.length} of ${allItems.length} articles`;

      if (filteredItems.length === 0) {
        resultsContainer.innerHTML = `
          <div class="py-16 text-center">
            <p class="text-lg text-white/50">No articles found matching your criteria.</p>
          </div>
        `;
        return;
      }

      resultsContainer.innerHTML = filteredItems.map(item => `
        <div class="group rounded-2xl border border-white/10 bg-white/5 p-6 backdrop-blur-sm transition-all hover:border-indigo-400/50 hover:bg-white/10">
          <!-- Header row: Source, Type, Date, Score -->
          <div class="mb-3 flex flex-wrap items-center gap-2 text-xs">
            <span class="rounded-full bg-indigo-500/20 px-3 py-1 font-medium text-indigo-300">
              ${item.source}
            </span>
            <span class="rounded-full px-3 py-1 font-medium ${getSourceTypeColor(item.source_type)}">
              ${item.source_type}
            </span>
            <span class="text-white/40">
              ${formatDate(item.pubDate)}
            </span>
            <span class="ml-auto rounded-full bg-purple-500/20 px-3 py-1 font-medium text-purple-300">
              ⭐ ${item.relevance_score.toFixed(1)}
            </span>
          </div>

          <!-- Title -->
          <h3 class="mb-2 text-lg font-semibold leading-snug text-white">
            <a href="${item.link}" target="_blank" class="hover:text-indigo-300 transition-colors">
              ${item.title}
            </a>
          </h3>

          <!-- Keywords/Tags -->
          ${item.matched_keywords && item.matched_keywords.length > 0 ? `
            <div class="mb-3 flex flex-wrap gap-1">
              ${item.matched_keywords.map(keyword => `<span class="tag">${keyword}</span>`).join('')}
            </div>
          ` : ''}

          <!-- Description -->
          <p class="line-clamp-2 text-sm leading-relaxed text-white/60">
            ${item.description}
          </p>

          <!-- Read more link -->
          <a
            href="${item.link}"
            target="_blank"
            class="mt-3 inline-flex items-center gap-2 text-sm font-medium text-indigo-300 transition-all hover:gap-3 hover:text-indigo-200"
          >
            Read article
            <svg class="size-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M13 7l5 5m0 0l-5 5m5-5H6" />
            </svg>
          </a>
        </div>
      `).join('');
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'Date unknown';
      try {
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { 
          year: 'numeric', 
          month: 'short', 
          day: 'numeric' 
        });
      } catch {
        return dateStr;
      }
    }

    // Snapshot toggle function
    function toggleSnapshot() {
      const content = document.getElementById('snapshotContent');
      const chevron = document.getElementById('snapshotChevron');
      
      if (content.classList.contains('hidden')) {
        content.classList.remove('hidden');
        chevron.style.transform = 'rotate(180deg)';
      } else {
        content.classList.add('hidden');
        chevron.style.transform = 'rotate(0deg)';
      }
    }

    // Initial render
    applyFilters();
  </script>
</body>
</html>
